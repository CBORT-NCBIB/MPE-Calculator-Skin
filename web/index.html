<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    *{margin:0;padding:0;box-sizing:border-box}

    .ls{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#f0f2f5;color:#525960;font-family:monospace;font-size:14px;gap:12px}

<body>
<div id="root"><div class="ls"><div id="lt">Loading calculator...</div><div id="le" class="err"></div></div></div>

<script>var le=[];function se(n){return function(){le.push(n);document.getElementById('le').textContent='Failed to load: '+le.join(', ')+'.';}}</script>
<script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js" onerror="se('React')()"></script>
<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js" onerror="se('ReactDOM')()"></script>
<script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js" onerror="se('PropTypes')()"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js" onerror="se('Recharts')()"></script>
<script src="https://cdn.plot.ly/plotly-basic-2.35.2.min.js" onerror="se('Plotly')()"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js" onerror="se('Babel')()"></script>

<script>
// Calculation engine (from engine.js — single source of truth)
/**
 * Data-Driven Laser Skin MPE Calculation Engine
 * ===============================================
 * This engine reads all standard-specific values from a JSON data file.
 * No standard-specific numbers are hardcoded here.
 *
 * TO USE A DIFFERENT STANDARD:
 *   1. Copy web/standards/icnirp_2013.json to a new file.
 *   2. Edit values to match your standard's tables.
 *   3. Call loadStandard(yourData) or change web/config.js.
 *   See web/standards/README.md for schema documentation.
 *
 * UNIT CONVENTION (all standards must use these units in JSON):
 *   Wavelength:  nm     Duration:  s     MPE output:  J/cm²
 */

var _std = null;
var _validationErrors = [];

// ═══════════════════════════════════════════════════════════════
// Schema validation — run on load to catch malformed data files
// ═══════════════════════════════════════════════════════════════
var VALID_FORMULAS = ["constant","power","linear","ca_constant","ca_power","ca_linear","discrete"];

function _validateStandard(data) {
  var errors = [];
  if (!data) { errors.push("No data provided"); return errors; }
  if (!data.standard || !data.standard.name) errors.push("Missing standard.name");
  if (!data.correction_factors || !data.correction_factors.CA) errors.push("Missing correction_factors.CA");
  if (!data.display_bands || !data.display_bands.length) errors.push("Missing or empty display_bands");
  if (!data.bands || !data.bands.length) errors.push("Missing or empty bands array");

  if (data.correction_factors && data.correction_factors.CA) {
    var ca = data.correction_factors.CA;
    if (!ca.regions || !ca.regions.length) errors.push("CA: missing regions array");
    if (ca.regions) {
      for (var ci = 0; ci < ca.regions.length; ci++) {
        var cr = ca.regions[ci];
        if (cr.wl_min_nm === undefined || cr.wl_max_nm === undefined) errors.push("CA region " + ci + ": missing wl bounds");
        if (cr.type !== "constant" && cr.type !== "power10") errors.push("CA region " + ci + ": unsupported type '" + cr.type + "'");
      }
    }
  }

  if (data.bands) {
    for (var bi = 0; bi < data.bands.length; bi++) {
      var band = data.bands[bi];
      if (!band.name) errors.push("Band " + bi + ": missing name");
      if (band.wl_min_nm === undefined || band.wl_max_nm === undefined) errors.push("Band '" + band.name + "': missing wl bounds");
      if (!band.mode) errors.push("Band '" + band.name + "': missing mode");

      var regionSets = [];
      if (band.mode === "dual_limit") {
        if (!band.thermal || !band.thermal.regions) errors.push("Band '" + band.name + "': dual_limit mode but missing thermal.regions");
        if (!band.photochemical || !band.photochemical.regions) errors.push("Band '" + band.name + "': dual_limit mode but missing photochemical.regions");
        if (band.thermal) regionSets.push(band.thermal.regions);
        if (band.photochemical) regionSets.push(band.photochemical.regions);
      } else {
        if (!band.regions || !band.regions.length) errors.push("Band '" + band.name + "': missing regions array");
        if (band.regions) regionSets.push(band.regions);
      }

      for (var rsi = 0; rsi < regionSets.length; rsi++) {
        var regs = regionSets[rsi];
        if (!regs) continue;
        for (var ri = 0; ri < regs.length; ri++) {
          var r = regs[ri];
          if (r.t_min_s === undefined || r.t_max_s === undefined) errors.push("Band '" + band.name + "' region " + ri + ": missing t bounds");
          if (!r.formula) errors.push("Band '" + band.name + "' region " + ri + ": missing formula");
          else if (VALID_FORMULAS.indexOf(r.formula) === -1) errors.push("Band '" + band.name + "' region " + ri + ": unknown formula '" + r.formula + "'");
          if (r.formula && r.formula !== "discrete" && r.a === undefined) errors.push("Band '" + band.name + "' region " + ri + ": formula '" + r.formula + "' requires 'a'");
          if (r.formula && (r.formula === "power" || r.formula === "ca_power") && r.b === undefined) errors.push("Band '" + band.name + "' region " + ri + ": formula '" + r.formula + "' requires 'b'");
        }
      }
    }
  }
  return errors;
}

function loadStandard(data) {
  _validationErrors = _validateStandard(data);
  if (_validationErrors.length > 0) {
    if (typeof console !== "undefined") {
      console.error("Standard data validation errors:");
      for (var i = 0; i < _validationErrors.length; i++) console.error("  - " + _validationErrors[i]);
    }
  }
  _std = data;
}

function getStandard() {
  if (!_std) throw new Error("No standard loaded. Call loadStandard() first.");
  return _std.standard;
}

function getValidationErrors() { return _validationErrors; }

// ═══════════════════════════════════════════════════════════════
// Correction factor C_A — evaluated from JSON data
// ═══════════════════════════════════════════════════════════════
function CA(wl_nm) {
  if (!_std) return 1;
  var def = _std.correction_factors.CA;
  var regions = def.regions;
  for (var i = 0; i < regions.length; i++) {
    var r = regions[i];
    if (wl_nm >= r.wl_min_nm && wl_nm < r.wl_max_nm) {
      if (r.type === "constant") return r.value;
      if (r.type === "power10") {
        return Math.pow(10, r.coefficient * (wl_nm - r.offset_nm));
      }
    }
    // Handle inclusive upper bound for last region
    if (i === regions.length - 1 && wl_nm === r.wl_max_nm) {
      if (r.type === "constant") return r.value;
      if (r.type === "power10") {
        return Math.pow(10, r.coefficient * (wl_nm - r.offset_nm));
      }
    }
  }
  return def.default_outside_range || 1;
}

// ═══════════════════════════════════════════════════════════════
// UV discrete step lookup — evaluated from JSON data
// ═══════════════════════════════════════════════════════════════
function uvDiscreteLookup(wl_nm) {
  if (!_std || !_std.uv_discrete_steps) return NaN;
  var ds = _std.uv_discrete_steps;
  var steps = ds.steps;
  for (var i = 0; i < steps.length; i++) {
    if (wl_nm < steps[i].wl_upper_nm) return steps[i].H_J_cm2;
  }
  return ds.fallback_H_J_cm2;
}

// ═══════════════════════════════════════════════════════════════
// Generic formula evaluator
// ═══════════════════════════════════════════════════════════════
function evalFormula(region, wl_nm, t) {
  var f = region.formula;
  if (f === "constant")     return region.a;
  if (f === "power")        return region.a * Math.pow(t, region.b);
  if (f === "linear")       return region.a * t;
  if (f === "ca_constant")  return region.a * CA(wl_nm);
  if (f === "ca_power")     return region.a * CA(wl_nm) * Math.pow(t, region.b);
  if (f === "ca_linear")    return region.a * CA(wl_nm) * t;
  if (f === "discrete")     return uvDiscreteLookup(wl_nm);
  return NaN;
}

// ═══════════════════════════════════════════════════════════════
// Evaluate a single set of duration regions for a given t
// Returns NaN if t is outside all defined regions.
// ═══════════════════════════════════════════════════════════════
function evalRegions(regions, wl_nm, t) {
  for (var i = 0; i < regions.length; i++) {
    var r = regions[i];
    // Check wavelength sub-filtering (used by UV photochemical)
    if (r.wl_min_nm !== undefined && r.wl_max_nm !== undefined) {
      if (wl_nm < r.wl_min_nm || wl_nm >= r.wl_max_nm) continue;
    }
    if (t >= r.t_min_s && t < r.t_max_s) {
      return evalFormula(r, wl_nm, t);
    }
    // Below t_min: check for special handling
    if (t < r.t_min_s && r.below_t_min === "not_applicable") {
      // Only match if wavelength is in range (for sub-filtered regions)
      if (r.wl_min_nm !== undefined && (wl_nm < r.wl_min_nm || wl_nm >= r.wl_max_nm)) continue;
      return Infinity;
    }
  }
  return NaN;
}

// ═══════════════════════════════════════════════════════════════
// Dual-limit band evaluation (e.g., UV: min of thermal and
// photochemical). Returns the most restrictive finite value.
// ═══════════════════════════════════════════════════════════════
function evalDualLimit(band, wl_nm, t) {
  var th = evalRegions(band.thermal.regions, wl_nm, t);
  var pc = evalRegions(band.photochemical.regions, wl_nm, t);
  var a = isFinite(th), b = isFinite(pc);
  if (a && b) return Math.min(th, pc);
  if (a) return th;
  if (b) return pc;
  return NaN;
}

// ═══════════════════════════════════════════════════════════════
// Main dispatcher: skin MPE for any wavelength and duration
// ═══════════════════════════════════════════════════════════════
function skinMPE(wl_nm, t) {
  if (!_std) return NaN;
  var bands = _std.bands;
  for (var i = 0; i < bands.length; i++) {
    var band = bands[i];
    var inBand = (wl_nm >= band.wl_min_nm && wl_nm < band.wl_max_nm);
    // Handle inclusive upper bound for the last band
    if (!inBand && i === bands.length - 1 && wl_nm === band.wl_max_nm) {
      inBand = true;
    }
    if (!inBand) continue;

    if (band.mode === "dual_limit") {
      return evalDualLimit(band, wl_nm, t);
    }
    // Single-mode band: just evaluate the duration regions
    return evalRegions(band.regions, wl_nm, t);
  }
  return NaN;
}

// ═══════════════════════════════════════════════════════════════
// Repetitive pulse: Rules 1 and 2 (skin only, no Rule 3)
// This logic is standard-independent.
// ═══════════════════════════════════════════════════════════════
function repPulse(wl_nm, tau, prf, T) {
  var rule1 = skinMPE(wl_nm, tau);
  var htotal = skinMPE(wl_nm, T);
  var N = prf * T;
  if (N <= 1) {
    return { rule1: rule1, rule2: rule1, H: rule1, N: N, binding: "Rule 1" };
  }
  var rule2 = htotal / N;
  var H = Math.min(rule1, rule2);
  var binding = rule1 <= rule2 ? "Rule 1" : "Rule 2";
  return { rule1: rule1, rule2: rule2, H: H, N: N, binding: binding };
}

// ═══════════════════════════════════════════════════════════════
// Band classification — reads from the loaded standard
// ═══════════════════════════════════════════════════════════════
function bandName(wl_nm) {
  if (!_std) return "";
  var db = _std.display_bands;
  for (var i = 0; i < db.length; i++) {
    if (wl_nm >= db[i].wl_start_nm && wl_nm < db[i].wl_end_nm) {
      return db[i].name;
    }
  }
  return db[db.length - 1].name;
}

// ═══════════════════════════════════════════════════════════════
// Standard metadata (for UI display)
// ═══════════════════════════════════════════════════════════════
function getSTANDARD() {
  if (!_std) return { name: "", reference: "", tables: "" };
  return {
    name: _std.standard.name,
    reference: _std.standard.reference,
    tables: _std.standard.tables_used,
    wlRange: _std.standard.wl_range_nm,
    durRange: _std.standard.dur_range_s,
    bands: _std.display_bands.map(function(b) {
      return { name: b.name, start: b.wl_start_nm, end: b.wl_end_nm };
    })
  };
}

// ═══════════════════════════════════════════════════════════════
// Photoacoustic SNR Optimizer
// Based on: Francis et al., JPhys Photonics (2026), Eqs. 5–12
// These functions are standard-independent — they call skinMPE()
// which uses whatever standard is currently loaded.
// ═══════════════════════════════════════════════════════════════

function paEffFluence(wl_nm, tau, f, T) {
  var rule1 = skinMPE(wl_nm, tau);
  var hT = skinMPE(wl_nm, T);
  if (!isFinite(rule1) || !isFinite(hT)) return NaN;
  var N = f * T;
  if (N < 1) N = 1;
  var rule2 = hT / N;
  return Math.min(rule1, rule2);
}

function paRelSNR(wl_nm, tau, f, T) {
  var phi_single = skinMPE(wl_nm, tau);
  if (!isFinite(phi_single) || phi_single <= 0) return NaN;
  var phi_eff = paEffFluence(wl_nm, tau, f, T);
  if (!isFinite(phi_eff) || phi_eff <= 0) return NaN;
  var N = f * T;
  if (N < 1) N = 1;
  return (phi_eff * Math.sqrt(N)) / phi_single;
}

function paOptimalPRF(wl_nm, tau, T) {
  var h_single = skinMPE(wl_nm, tau);
  var h_total = skinMPE(wl_nm, T);
  if (!isFinite(h_single) || !isFinite(h_total) || h_single <= 0 || T <= 0) return NaN;
  return h_total / (h_single * T);
}

// ═══════════════════════════════════════════════════════════════
// Beam geometry & limiting aperture (ICNIRP 2013 Table 8, Table 7 note b, p. 288)
//
// The limiting aperture defines the area over which radiant exposure is
// averaged for comparison with the MPE. For skin:
//   λ < 100 µm:  3.5 mm  (Table 8)
//   λ ≥ 100 µm:  11 mm   (Table 8)
//
// Evaluation rules (Table 7 note b, p. 288):
//   d < 1 mm:        Use ACTUAL radiant exposure (no aperture averaging)
//   1 mm ≤ d < d_ap: Average over the limiting aperture
//   d ≥ d_ap:        Beam fills/overfills aperture, use actual beam area
// ═══════════════════════════════════════════════════════════════
function getAperture(wl_nm) {
  if (!_std || !_std.supplementary || !_std.supplementary.limiting_apertures) {
    return wl_nm < 100000 ? 3.5 : 11.0;
  }
  var regs = _std.supplementary.limiting_apertures.regions;
  for (var i = 0; i < regs.length; i++) {
    if (wl_nm >= regs[i].wl_min_nm && wl_nm < regs[i].wl_max_nm)
      return regs[i].diameter_mm;
  }
  return regs[regs.length - 1].diameter_mm;
}

function beamEval(wl_nm, beam_dia_mm) {
  var d_ap = getAperture(wl_nm);
  if (!isFinite(beam_dia_mm) || beam_dia_mm <= 0) {
    return { d_eval_mm: 0, area_cm2: 0, regime: "invalid", aperture_mm: d_ap };
  }
  var d = beam_dia_mm;
  var d_eval, regime;

  // Read small-beam threshold from standard (default 1.0 mm if not specified)
  var ap = _std && _std.supplementary && _std.supplementary.limiting_apertures;
  var threshold = (ap && ap.small_beam_threshold_mm) || 1.0;

  if (d < threshold) {
    d_eval = d;
    regime = "actual_sub_threshold";
  } else if (d < d_ap) {
    d_eval = d_ap;
    regime = "aperture_averaged";
  } else {
    d_eval = d;
    regime = "actual_fills";
  }

  var r_cm = d_eval / 20; // mm → cm radius
  var area_cm2 = Math.PI * r_cm * r_cm;
  return { d_eval_mm: d_eval, area_cm2: area_cm2, regime: regime, aperture_mm: d_ap, threshold_mm: threshold };
}

// ═══════════════════════════════════════════════════════════════
// Scanning Beam MPE Engine
// ═══════════════════════════════════════════════════════════════
//
// Computes cumulative fluence on a discretized skin surface from
// a scanning Gaussian beam. Supports CW (analytical path-segment
// integration) and pulsed (exact pulse positioning) beams.
//
// Physical model:
//   - Skin is flat in the xy-plane, beam propagates along z.
//   - Beam has Gaussian TEM₀₀ profile, 1/e diameter convention.
//   - All exposures within window T are fully cumulative.
//   - Rule 3 (N^-1/4) does NOT apply to skin.
//
// Key relationships:
//   d_1e = beam 1/e diameter (user input)
//   σ = d_1e / (2√2)           Gaussian standard deviation
//   w = d_1e / √2              1/e² radius
//   E₀ = 2P / (πw²)           Peak on-axis irradiance
//   H₀_pulse = 2Ep / (πw²)    Peak single-pulse fluence
// ═══════════════════════════════════════════════════════════════

// ── Dwell time ──────────────────────────────────────────────────

/**
 * Exact Gaussian dwell time: the equivalent flat-top duration that
 * delivers the same peak fluence as the Gaussian time-integral.
 * t_dwell = d_1e * sqrt(π) / (2v) ≈ 0.8862 * d_1e / v
 */
function scanDwellGaussian(d_1e_mm, v_mm_s) {
  return d_1e_mm * Math.sqrt(Math.PI) / (2 * v_mm_s);
}

/**
 * Geometric edge-to-edge dwell time: the time for the beam to
 * translate exactly one 1/e diameter.
 * t_dwell = d_1e / v
 * ~13% larger than the Gaussian result (conservative).
 */
function scanDwellGeometric(d_1e_mm, v_mm_s) {
  return d_1e_mm / v_mm_s;
}

// ── Error function approximation ────────────────────────────────

/**
 * Error function erf(x) via Abramowitz & Stegun 7.1.26.
 * Maximum error < 1.5×10⁻⁷.
 */
function _erf(x) {
  var a1 =  0.254829592;
  var a2 = -0.284496736;
  var a3 =  1.421413741;
  var a4 = -1.453152027;
  var a5 =  1.061405429;
  var p  =  0.3275911;
  var sign = x < 0 ? -1 : 1;
  x = Math.abs(x);
  var t = 1.0 / (1.0 + p * x);
  var y = 1.0 - (((((a5 * t + a4) * t) + a3) * t + a2) * t + a1) * t * Math.exp(-x * x);
  return sign * y;
}

// ── Precomputed Gaussian lookup table ───────────────────────────

var _gaussTable = null;
var _GAUSS_N = 1024;
var _GAUSS_MAX = 9.0; // exp(-9) ≈ 1.2e-4, negligible

function _initGaussTable() {
  if (_gaussTable) return;
  _gaussTable = new Float64Array(_GAUSS_N);
  for (var i = 0; i < _GAUSS_N; i++) {
    _gaussTable[i] = Math.exp(-i * _GAUSS_MAX / (_GAUSS_N - 1));
  }
}

/**
 * Fast lookup for exp(-u) where u = 2r²/w².
 * Returns 0 for u ≥ _GAUSS_MAX.
 */
function _gaussLookup(u) {
  if (u >= _GAUSS_MAX) return 0;
  if (u <= 0) return 1;
  var idx = u * (_GAUSS_N - 1) / _GAUSS_MAX;
  var i = idx | 0; // floor
  var frac = idx - i;
  return _gaussTable[i] * (1 - frac) + _gaussTable[i + 1] * frac;
}

// ── Grid creation ───────────────────────────────────────────────

/**
 * Create a fluence grid covering the scan path bounding box plus
 * a margin of 3 × beam diameter on each side.
 *
 * @param {number} d_1e_mm - Beam 1/e diameter in mm
 * @param {Array} segments - ScanSegment[]
 * @param {number} ppd - Points per diameter (default 8, min 4, max 32)
 * @returns {Object} FluenceGrid
 */
function createFluenceGrid(d_1e_mm, segments, ppd) {
  if (!ppd || ppd < 4) ppd = 4;
  if (ppd > 32) ppd = 32;
  var dx = d_1e_mm / ppd;
  var margin = 3 * d_1e_mm;

  // Find bounding box of all segment start points and end points
  var xmin = Infinity, xmax = -Infinity, ymin = Infinity, ymax = -Infinity;
  for (var i = 0; i < segments.length; i++) {
    var s = segments[i];
    var xe = s.x_start_mm + d_1e_mm * Math.cos(s.angle_rad);
    var ye = s.y_start_mm + d_1e_mm * Math.sin(s.angle_rad);
    if (s.x_start_mm < xmin) xmin = s.x_start_mm;
    if (s.x_start_mm > xmax) xmax = s.x_start_mm;
    if (s.y_start_mm < ymin) ymin = s.y_start_mm;
    if (s.y_start_mm > ymax) ymax = s.y_start_mm;
    if (xe < xmin) xmin = xe;
    if (xe > xmax) xmax = xe;
    if (ye < ymin) ymin = ye;
    if (ye > ymax) ymax = ye;
  }

  xmin -= margin; xmax += margin;
  ymin -= margin; ymax += margin;

  var nx = Math.ceil((xmax - xmin) / dx) + 1;
  var ny = Math.ceil((ymax - ymin) / dx) + 1;

  // Safety cap: limit grid to 4M points (16 MB per array)
  if (nx * ny > 4000000) {
    var scale = Math.sqrt(4000000 / (nx * ny));
    nx = Math.floor(nx * scale);
    ny = Math.floor(ny * scale);
    dx = (xmax - xmin) / (nx - 1);
  }

  return {
    nx: nx,
    ny: ny,
    dx_mm: dx,
    x_min_mm: xmin,
    y_min_mm: ymin,
    fluence: new Float32Array(nx * ny),       // cumulative J/cm²
    pulse_count: new Float32Array(nx * ny),   // cumulative pulse count
    peak_pulse_H: new Float32Array(nx * ny),  // max single-pulse J/cm²
    last_visit_t: (function() {               // time of last visit (s)
      var a = new Float32Array(nx * ny);
      for (var i = 0; i < a.length; i++) a[i] = -1e30;
      return a;
    })(),
    min_revisit_s: (function() {              // min interval between visits (s)
      var a = new Float32Array(nx * ny);
      for (var i = 0; i < a.length; i++) a[i] = 1e30;
      return a;
    })()
  };
}

// ── Pulsed beam: exact pulse positioning ────────────────────────

/**
 * Compute cumulative fluence from a pulsed scanning beam using
 * exact pulse positioning. Each pulse is placed at its precise
 * (x, y) along the scan path, and its Gaussian footprint is
 * deposited onto the grid.
 *
 * Modifies grid.fluence, grid.pulse_count, grid.peak_pulse_H in place.
 *
 * @param {Object} grid - FluenceGrid
 * @param {number} d_1e_mm - Beam 1/e diameter
 * @param {number} prf_hz - Pulse repetition frequency
 * @param {number} pulse_energy_J - Energy per pulse
 * @param {Array} segments - ScanSegment[]
 * @returns {Object} { total_pulses, total_time_s }
 */
function computeScanFluencePulsed(grid, d_1e_mm, prf_hz, pulse_energy_J, segments) {
  _initGaussTable();

  var w = d_1e_mm / Math.sqrt(2);          // 1/e² radius in mm
  var sigma = d_1e_mm / (2 * Math.sqrt(2)); // σ in mm
  var w2 = w * w;
  var H0_mm2 = 2 * pulse_energy_J / (Math.PI * w2); // peak fluence J/mm²
  var H0_cm2 = H0_mm2 * 100;               // peak fluence J/cm²

  var trunc_mm = 3 * sigma;
  var trunc2 = trunc_mm * trunc_mm;
  var trunc_grid = Math.ceil(trunc_mm / grid.dx_mm);

  var nx = grid.nx, ny = grid.ny;
  var dx = grid.dx_mm;
  var xmin = grid.x_min_mm, ymin = grid.y_min_mm;
  var flu = grid.fluence, pc = grid.pulse_count, ppH = grid.peak_pulse_H;
  var lvt = grid.last_visit_t, mrv = grid.min_revisit_s;

  var t_elapsed = 0;
  var total_pulses = 0;

  // Revisit threshold: max dwell time across all segments.
  // This ensures transitions between scan lines and jumps within a single
  // raster cycle are NOT misclassified as revisits. Only genuine multi-cycle
  // revisits (gap >> max dwell) are detected.
  var revisit_threshold = 0;
  for (var ri = 0; ri < segments.length; ri++) {
    var rd = d_1e_mm / segments[ri].v_mm_s;
    if (rd > revisit_threshold) revisit_threshold = rd;
  }
  // Use 2× max dwell to add margin for edge cases at segment boundaries
  revisit_threshold *= 2;

  for (var si = 0; si < segments.length; si++) {
    var seg = segments[si];
    var seg_dur = d_1e_mm / seg.v_mm_s;
    var t_seg_start = t_elapsed;
    var t_seg_end = t_elapsed + seg_dur;

    var cos_a = Math.cos(seg.angle_rad);
    var sin_a = Math.sin(seg.angle_rad);

    // Find pulse indices that fire within this segment's time window
    var k_first = Math.ceil(t_seg_start * prf_hz);
    var k_last_f = t_seg_end * prf_hz;
    // Exclude pulses exactly at the segment boundary (belong to next)
    var k_last = (k_last_f === Math.floor(k_last_f)) ?
      Math.floor(k_last_f) - 1 : Math.floor(k_last_f);

    for (var k = k_first; k <= k_last; k++) {
      var t_k = k / prf_hz;
      var frac = (t_k - t_seg_start) / seg_dur;

      // Exact pulse position
      var px = seg.x_start_mm + frac * d_1e_mm * cos_a;
      var py = seg.y_start_mm + frac * d_1e_mm * sin_a;

      // Grid indices of pulse center
      var cix = Math.round((px - xmin) / dx);
      var ciy = Math.round((py - ymin) / dx);

      // Iterate over nearby grid points within truncation radius
      var ixMin = cix - trunc_grid; if (ixMin < 0) ixMin = 0;
      var ixMax = cix + trunc_grid; if (ixMax >= nx) ixMax = nx - 1;
      var iyMin = ciy - trunc_grid; if (iyMin < 0) iyMin = 0;
      var iyMax = ciy + trunc_grid; if (iyMax >= ny) iyMax = ny - 1;

      for (var iy = iyMin; iy <= iyMax; iy++) {
        var gy = ymin + iy * dx;
        var dy2 = (gy - py) * (gy - py);
        if (dy2 > trunc2) continue; // early row skip

        for (var ix = ixMin; ix <= ixMax; ix++) {
          var gx = xmin + ix * dx;
          var dx2 = (gx - px) * (gx - px);
          var r2 = dx2 + dy2;
          if (r2 > trunc2) continue;

          var two_r2_over_w2 = 2 * r2 / w2;
          var Hp = H0_cm2 * _gaussLookup(two_r2_over_w2);

          var idx = iy * nx + ix;
          flu[idx] += Hp;
          pc[idx] += 1;
          if (Hp > ppH[idx]) ppH[idx] = Hp;

          // Revisit tracking: if gap since last visit > threshold, it's a new visit
          var gap = t_k - lvt[idx];
          if (gap > revisit_threshold && lvt[idx] > -1e29) {
            if (gap < mrv[idx]) mrv[idx] = gap;
          }
          lvt[idx] = t_k;
        }
      }
      total_pulses++;
    }
    t_elapsed = t_seg_end;
  }

  return { total_pulses: total_pulses, total_time_s: t_elapsed };
}

// ── CW beam: analytical path-segment integration ────────────────

/**
 * Compute cumulative fluence from a CW scanning beam using the
 * analytical Gaussian integral formula with error functions.
 * Consecutive segments with the same angle and velocity are merged
 * into single sweeps for efficiency.
 *
 * Formula per sweep from (x1,y1) to (x2,y2):
 *   F(px,py) = P/(2π σ v) × exp(-d_perp²/(2σ²))
 *              × ½[erf((L - t_par)/(σ√2)) - erf((-t_par)/(σ√2))]
 *
 * Modifies grid.fluence in place.
 *
 * @param {Object} grid - FluenceGrid
 * @param {number} d_1e_mm - Beam 1/e diameter
 * @param {number} avg_power_W - Average power
 * @param {Array} segments - ScanSegment[]
 * @returns {Object} { n_sweeps, total_time_s }
 */
function computeScanFluenceCW(grid, d_1e_mm, avg_power_W, segments) {
  var sigma = d_1e_mm / (2 * Math.sqrt(2));
  var s2 = sigma * Math.sqrt(2);
  var sigma2 = sigma * sigma;
  var trunc_perp = 3 * sigma;
  var trunc_perp2 = trunc_perp * trunc_perp;

  var nx = grid.nx, ny = grid.ny;
  var dx = grid.dx_mm;
  var xmin = grid.x_min_mm, ymin = grid.y_min_mm;
  var flu = grid.fluence;
  var ppH = grid.peak_pulse_H; // reused for peak single-sweep fluence in CW
  var lvt = grid.last_visit_t, mrv = grid.min_revisit_s;

  // Merge consecutive segments with same angle, velocity, AND position continuity
  var sweeps = [];
  var si = 0;
  while (si < segments.length) {
    var s0 = segments[si];
    var a = s0.angle_rad, v = s0.v_mm_s;
    var cos_a = Math.cos(a), sin_a = Math.sin(a);
    var n_merged = 1;
    while (si + n_merged < segments.length &&
           segments[si + n_merged].angle_rad === a &&
           segments[si + n_merged].v_mm_s === v) {
      // Check position continuity: expected end of current chain
      var exp_x = s0.x_start_mm + n_merged * d_1e_mm * cos_a;
      var exp_y = s0.y_start_mm + n_merged * d_1e_mm * sin_a;
      var nxt = segments[si + n_merged];
      var dx_gap = nxt.x_start_mm - exp_x;
      var dy_gap = nxt.y_start_mm - exp_y;
      if (dx_gap * dx_gap + dy_gap * dy_gap > d_1e_mm * d_1e_mm * 0.01) break;
      n_merged++;
    }
    var L = n_merged * d_1e_mm;
    sweeps.push({
      x1: s0.x_start_mm, y1: s0.y_start_mm,
      x2: s0.x_start_mm + L * cos_a,
      y2: s0.y_start_mm + L * sin_a,
      ux: cos_a, uy: sin_a, L: L, v: v
    });
    si += n_merged;
  }

  var total_time = 0;
  var min_velocity = Infinity;
  var coeff_base = avg_power_W / (sigma * Math.sqrt(2 * Math.PI));

  for (var wi = 0; wi < sweeps.length; wi++) {
    var sw = sweeps[wi];
    var coeff = coeff_base / sw.v * 100; // J/cm²
    if (sw.v < min_velocity) min_velocity = sw.v;
    var sweep_t0 = total_time; // time when this sweep begins

    // Bounding box of this sweep ± 3σ
    var sxmin = Math.min(sw.x1, sw.x2) - trunc_perp;
    var sxmax = Math.max(sw.x1, sw.x2) + trunc_perp;
    var symin = Math.min(sw.y1, sw.y2) - trunc_perp;
    var symax = Math.max(sw.y1, sw.y2) + trunc_perp;

    var ixMin = Math.max(0, Math.floor((sxmin - xmin) / dx));
    var ixMax = Math.min(nx - 1, Math.ceil((sxmax - xmin) / dx));
    var iyMin = Math.max(0, Math.floor((symin - ymin) / dx));
    var iyMax = Math.min(ny - 1, Math.ceil((symax - ymin) / dx));

    for (var iy = iyMin; iy <= iyMax; iy++) {
      var gy = ymin + iy * dx;
      for (var ix = ixMin; ix <= ixMax; ix++) {
        var gx = xmin + ix * dx;
        var qx = gx - sw.x1;
        var qy = gy - sw.y1;
        var t_par = qx * sw.ux + qy * sw.uy;
        if (t_par < -trunc_perp || t_par > sw.L + trunc_perp) continue;
        var d_perp = qx * sw.uy - qy * sw.ux;
        var d_perp2 = d_perp * d_perp;
        if (d_perp2 > trunc_perp2) continue;
        var env = Math.exp(-d_perp2 / (2 * sigma2));
        var erf_end = _erf((sw.L - t_par) / s2);
        var erf_start = _erf(-t_par / s2);
        var F = coeff * env * 0.5 * (erf_end - erf_start);
        if (F > 0) {
          var idx = iy * nx + ix;
          flu[idx] += F;
          if (F > ppH[idx]) ppH[idx] = F;
          // Revisit tracking: visit time = sweep start + clamped t_par / v
          var t_clamped = t_par < 0 ? 0 : (t_par > sw.L ? sw.L : t_par);
          var t_visit = sweep_t0 + t_clamped / sw.v;
          var gap = t_visit - lvt[idx];
          if (gap > 0 && lvt[idx] > -1e29) {
            if (gap < mrv[idx]) mrv[idx] = gap;
          }
          lvt[idx] = t_visit;
        }
      }
    }
    total_time += sw.L / sw.v;
  }

  return { n_sweeps: sweeps.length, total_time_s: total_time, min_velocity: min_velocity };
}

// ── Unified fluence computation ─────────────────────────────────

/**
 * Compute fluence grid from a scan path. Dispatches to CW or pulsed.
 *
 * @param {Object} beam - { d_1e_mm, is_cw, prf_hz, pulse_energy_J, avg_power_W }
 * @param {Array} segments - ScanSegment[]
 * @param {number} ppd - Points per diameter (default 8)
 * @returns {Object} { grid, stats }
 */
function computeScanFluence(beam, segments, ppd) {
  if (!segments || segments.length === 0) return null;
  ppd = ppd || 8;
  var grid = createFluenceGrid(beam.d_1e_mm, segments, ppd);
  var stats;
  if (beam.is_cw) {
    stats = computeScanFluenceCW(grid, beam.d_1e_mm, beam.avg_power_W, segments);
    stats.total_pulses = 0;
  } else {
    stats = computeScanFluencePulsed(grid, beam.d_1e_mm, beam.prf_hz,
      beam.pulse_energy_J, segments);
  }
  return { grid: grid, stats: stats };
}

// ── Safety evaluation ───────────────────────────────────────────

/**
 * Evaluate scan safety against the loaded standard's MPE.
 *
 * Rule 1: peak single-pulse fluence ≤ MPE(τ)         [pulsed]
 *         OR peak single-sweep fluence ≤ MPE(t_dwell) [CW]
 * Rule 2: cumulative fluence ≤ MPE(T)                [both]
 *
 * @param {Object} grid - FluenceGrid (already computed)
 * @param {Object} beam - BeamParams
 * @param {number} T_s - Total exposure window in seconds
 * @param {string} dwell_mode - "gaussian" or "geometric" (for CW Rule 1)
 * @param {number} min_velocity - Minimum scan velocity in mm/s (for CW Rule 1)
 * @returns {Object} ScanSafetyResult
 */
function evaluateScanSafety(grid, beam, T_s, dwell_mode, min_velocity) {
  var mpe_T = skinMPE(beam.wl_nm, T_s);
  var mpe_tau, rule1_limit;

  if (beam.is_cw) {
    // CW Rule 1: single-sweep fluence ≤ MPE(t_dwell)
    // t_dwell uses the minimum velocity (most conservative = slowest sweep)
    if (isFinite(min_velocity) && min_velocity > 0) {
      var t_dwell = (dwell_mode === "geometric") ?
        scanDwellGeometric(beam.d_1e_mm, min_velocity) :
        scanDwellGaussian(beam.d_1e_mm, min_velocity);
      mpe_tau = skinMPE(beam.wl_nm, t_dwell);
      rule1_limit = mpe_tau;
    } else {
      mpe_tau = NaN;
      rule1_limit = Infinity;
    }
  } else {
    mpe_tau = skinMPE(beam.wl_nm, beam.tau_s);
    rule1_limit = mpe_tau;
  }

  var n = grid.nx * grid.ny;
  var worstR1 = 0, worstR2 = 0;
  var worstIdx = 0, worstVal = 0;
  var peakF = 0, maxPulses = 0;

  for (var i = 0; i < n; i++) {
    if (grid.fluence[i] > peakF) peakF = grid.fluence[i];
    if (grid.pulse_count[i] > maxPulses) maxPulses = grid.pulse_count[i];

    var r1 = isFinite(rule1_limit) && rule1_limit > 0 ?
      (grid.peak_pulse_H[i] / rule1_limit) : 0;
    var r2 = isFinite(mpe_T) ? (grid.fluence[i] / mpe_T) : 0;

    if (r1 > worstR1) worstR1 = r1;
    if (r2 > worstR2) worstR2 = r2;

    var worst = r1 > r2 ? r1 : r2;
    if (worst > worstVal) {
      worstVal = worst;
      worstIdx = i;
    }
  }

  var worstIx = worstIdx % grid.nx;
  var worstIy = (worstIdx - worstIx) / grid.nx;

  // Revisit timing statistics
  var globalMinRevisit = 1e30;
  var revisitPoints = 0;
  for (var ri = 0; ri < n; ri++) {
    if (grid.min_revisit_s[ri] < 1e29) { // point was revisited at least once
      revisitPoints++;
      if (grid.min_revisit_s[ri] < globalMinRevisit)
        globalMinRevisit = grid.min_revisit_s[ri];
    }
  }
  if (globalMinRevisit >= 1e29) globalMinRevisit = Infinity;

  // Thermal relaxation time: τ_r ≈ d²/(4κ), κ ≈ 0.13 mm²/s (skin)
  var kappa_skin = 0.13; // mm²/s (middle of 0.1–0.15 range)
  var thermal_relax_s = (beam.d_1e_mm * beam.d_1e_mm) / (4 * kappa_skin);

  return {
    safe: worstR1 <= 1.0 && worstR2 <= 1.0,
    worst_ratio: worstVal,
    worst_x_mm: grid.x_min_mm + worstIx * grid.dx_mm,
    worst_y_mm: grid.y_min_mm + worstIy * grid.dx_mm,
    binding_rule: worstR1 >= worstR2 ? "Rule 1" : "Rule 2",
    safety_margin: 1.0 - worstVal,
    mpe_tau: mpe_tau,
    mpe_T: mpe_T,
    peak_fluence: peakF,
    peak_pulse_H_max: grid.peak_pulse_H[worstIdx],
    max_pulses: maxPulses,
    rule1_max_ratio: worstR1,
    rule2_max_ratio: worstR2,
    min_revisit_s: globalMinRevisit,
    revisit_points: revisitPoints,
    thermal_relax_s: thermal_relax_s,
    revisit_adequate: globalMinRevisit >= thermal_relax_s
  };
}

// ── Minimum safe velocity (bisection search) ────────────────────

/**
 * Find the minimum scan velocity that keeps all points within MPE.
 *
 * Uses bisection: at each candidate velocity, rebuilds the scan path,
 * computes the fluence grid, and evaluates safety.
 *
 * @param {Object} beam - BeamParams (wl_nm, d_1e_mm, tau_s, prf_hz, avg_power_W, is_cw)
 * @param {string} pattern - "linear", "bidi", or "raster"
 * @param {Object} patParams - Pattern parameters (line_length_mm, n_lines, hatch_mm, etc.)
 * @param {number} T_s - Total exposure window in seconds (0 = use scan time)
 * @param {number} ppd - Points per diameter
 * @param {string} dwell_mode - "gaussian" or "geometric"
 * @returns {Object} { v_min, safe_at_vmin, iterations }
 */
function minSafeVelocity(beam, pattern, patParams, T_s, ppd, dwell_mode) {
  ppd = ppd || 8;
  dwell_mode = dwell_mode || "gaussian";

  function testVelocity(v) {
    var segs;
    var d = beam.d_1e_mm || beam.d;
    var jv = v * 5; // jump velocity = 5× scan velocity
    if (pattern === "linear") {
      segs = buildLinearScan(0, 0, 0, patParams.line_length_mm, v, d);
    } else if (pattern === "bidi") {
      segs = buildBidiRasterScan(0, 0, patParams.line_length_mm,
        patParams.n_lines, patParams.hatch_mm, v, jv, d);
    } else {
      segs = buildRasterScan(0, 0, patParams.line_length_mm,
        patParams.n_lines, patParams.hatch_mm, v, jv, d);
    }
    if (!segs || segs.length === 0) return { safe: true };

    var grid = createFluenceGrid(d, segs, ppd);
    var stats;
    if (beam.is_cw) {
      stats = computeScanFluenceCW(grid, d, beam.avg_power_W || beam.P, segs);
    } else {
      var Ep = beam.pulse_energy_J || beam.Ep ||
        (beam.avg_power_W || beam.P) / (beam.prf_hz || beam.prf);
      stats = computeScanFluencePulsed(grid, d, beam.prf_hz || beam.prf, Ep, segs);
    }
    var T = T_s > 0 ? T_s : stats.total_time_s;
    var mv = beam.is_cw ? (stats.min_velocity || v) : 0;
    return evaluateScanSafety(grid, beam.is_cw ?
      { wl_nm: beam.wl_nm || beam.wl, d_1e_mm: d, is_cw: true } :
      { wl_nm: beam.wl_nm || beam.wl, d_1e_mm: d, tau_s: beam.tau_s || beam.tau, is_cw: false },
      T, dwell_mode, mv);
  }

  var vLow = 0.01, vHigh = 1e6;
  var iterations = 0;

  // First check: is the problem solvable at all?
  var highTest = testVelocity(vHigh);
  if (!highTest.safe) {
    return { v_min: Infinity, safe_at_vmin: false, iterations: 0 };
  }

  // Bisect
  while ((vHigh - vLow) / vLow > 0.001 && iterations < 50) {
    var vMid = (vLow + vHigh) / 2;
    var result = testVelocity(vMid);
    if (result.safe) vHigh = vMid;
    else vLow = vMid;
    iterations++;
  }

  return { v_min: vHigh, safe_at_vmin: true, iterations: iterations };
}

// ── Closed-form inverse functions ───────────────────────────────

/**
 * Maximum permissible pulse energy from Rule 1 alone.
 * Independent of scan geometry — depends only on beam diameter,
 * wavelength, and pulse duration.
 *
 * Physics: H_pulse = 2·Ep/(π·w²) [J/mm²] × 100 [→ J/cm²]
 *          H_pulse ≤ MPE(τ)
 *          Ep ≤ MPE(τ) × π·w² / 200
 *
 * @param {number} wl_nm - Wavelength in nm
 * @param {number} d_1e_mm - 1/e beam diameter in mm
 * @param {number} tau_s - Pulse duration in seconds
 * @returns {number} Maximum pulse energy in joules
 */
function maxPulseEnergy(wl_nm, d_1e_mm, tau_s) {
  var w = d_1e_mm / Math.sqrt(2); // 1/e² radius in mm
  var mpe_tau = skinMPE(wl_nm, tau_s);
  return mpe_tau * Math.PI * w * w / 200;
}

/**
 * Minimum repetition rate from Rule 1 at a given average power.
 * Below this PRF, individual pulse energy exceeds the single-pulse MPE.
 *
 * Physics: Ep = P/PRF, H_pulse = 2P/(PRF·π·w²) × 100
 *          H_pulse ≤ MPE(τ)
 *          PRF ≥ 200·P / (π·w²·MPE(τ))
 *
 * Note: Rule 2 (cumulative) is PRF-independent at fixed power because
 * N_pulses × H_pulse = (PRF·t_dwell) × 2P/(PRF·π·w²) × 100
 *                     = 2P·t_dwell/(π·w²) × 100
 * The PRF cancels, so only Rule 1 constrains the minimum PRF.
 *
 * @param {number} wl_nm - Wavelength in nm
 * @param {number} d_1e_mm - 1/e beam diameter in mm
 * @param {number} tau_s - Pulse duration in seconds
 * @param {number} avg_power_W - Average power in watts
 * @returns {number} Minimum repetition rate in Hz
 */
function minRepRate(wl_nm, d_1e_mm, tau_s, avg_power_W) {
  var w = d_1e_mm / Math.sqrt(2);
  var mpe_tau = skinMPE(wl_nm, tau_s);
  if (mpe_tau <= 0) return Infinity;
  return 200 * avg_power_W / (Math.PI * w * w * mpe_tau);
}

// ── Scan path builders ──────────────────────────────────────────

/**
 * Build a linear (straight-line) scan path.
 * @returns {Array} ScanSegment[]
 */
function buildLinearScan(x0, y0, angle_rad, total_length_mm, v_mm_s, d_1e_mm) {
  var n = Math.round(total_length_mm / d_1e_mm);
  if (n < 1) n = 1;
  var cos_a = Math.cos(angle_rad), sin_a = Math.sin(angle_rad);
  var segs = [];
  for (var i = 0; i < n; i++) {
    segs.push({
      x_start_mm: x0 + i * d_1e_mm * cos_a,
      y_start_mm: y0 + i * d_1e_mm * sin_a,
      angle_rad: angle_rad,
      v_mm_s: v_mm_s
    });
  }
  return segs;
}

/**
 * Build a bidirectional raster scan path.
 * Alternating scan directions, connected by perpendicular jumps.
 * @returns {Array} ScanSegment[]
 */
function buildBidiRasterScan(x0, y0, line_length_mm, n_lines, hatch_mm,
                             scan_v_mm_s, jump_v_mm_s, d_1e_mm) {
  var segs = [];
  for (var j = 0; j < n_lines; j++) {
    var line_y = y0 + j * hatch_mm;
    if (j % 2 === 0) {
      // Left to right
      var lineSegs = buildLinearScan(x0, line_y, 0, line_length_mm,
        scan_v_mm_s, d_1e_mm);
      for (var k = 0; k < lineSegs.length; k++) segs.push(lineSegs[k]);
    } else {
      // Right to left
      var lineSegs2 = buildLinearScan(x0 + line_length_mm, line_y, Math.PI,
        line_length_mm, scan_v_mm_s, d_1e_mm);
      for (var k2 = 0; k2 < lineSegs2.length; k2++) segs.push(lineSegs2[k2]);
    }
    // Jump to next line (if not last)
    if (j < n_lines - 1) {
      var jumpEnd_x = (j % 2 === 0) ? x0 + line_length_mm : x0;
      var jumpSegs = buildLinearScan(jumpEnd_x, line_y, Math.PI / 2,
        hatch_mm, jump_v_mm_s, d_1e_mm);
      for (var k3 = 0; k3 < jumpSegs.length; k3++) segs.push(jumpSegs[k3]);
    }
  }
  return segs;
}

/**
 * Build a unidirectional raster scan path.
 * All lines scan in the same direction; beam returns before each new line.
 * @returns {Array} ScanSegment[]
 */
function buildRasterScan(x0, y0, line_length_mm, n_lines, hatch_mm,
                         scan_v_mm_s, jump_v_mm_s, d_1e_mm) {
  var segs = [];
  for (var j = 0; j < n_lines; j++) {
    var line_y = y0 + j * hatch_mm;
    // Scan left to right
    var lineSegs = buildLinearScan(x0, line_y, 0, line_length_mm,
      scan_v_mm_s, d_1e_mm);
    for (var k = 0; k < lineSegs.length; k++) segs.push(lineSegs[k]);

    if (j < n_lines - 1) {
      // Return right to left (fast jump)
      var retSegs = buildLinearScan(x0 + line_length_mm, line_y, Math.PI,
        line_length_mm, jump_v_mm_s, d_1e_mm);
      for (var k2 = 0; k2 < retSegs.length; k2++) segs.push(retSegs[k2]);
      // Step down to next line
      var stepSegs = buildLinearScan(x0, line_y, Math.PI / 2,
        hatch_mm, jump_v_mm_s, d_1e_mm);
      for (var k3 = 0; k3 < stepSegs.length; k3++) segs.push(stepSegs[k3]);
    }
  }

}

/**
 * Build a scan path from a list of waypoints.
 * Each waypoint: { x_mm, y_mm, v_mm_s }
 * The path between consecutive waypoints is decomposed into
 * beam-diameter segments.
 * @returns {Array} ScanSegment[]
 */
function buildCustomScan(waypoints, d_1e_mm) {
  var segs = [];
  for (var i = 0; i < waypoints.length - 1; i++) {
    var wp0 = waypoints[i], wp1 = waypoints[i + 1];
    var dxx = wp1.x_mm - wp0.x_mm;
    var dyy = wp1.y_mm - wp0.y_mm;
    var dist = Math.sqrt(dxx * dxx + dyy * dyy);
    if (dist < 1e-12) continue;
    var angle = Math.atan2(dyy, dxx);
    var v = wp0.v_mm_s;

    var n_seg = Math.round(dist / d_1e_mm);
    if (n_seg < 1) n_seg = 1;
    var actual_len = dist / n_seg;
    var cos_a = Math.cos(angle), sin_a = Math.sin(angle);

    for (var k = 0; k < n_seg; k++) {
      segs.push({
        x_start_mm: wp0.x_mm + k * actual_len * cos_a,
        y_start_mm: wp0.y_mm + k * actual_len * sin_a,
        angle_rad: angle,
        v_mm_s: v
      });
    }
  }
  return segs;
}

// ── Inverse functions ───────────────────────────────────────────

/**
 * Maximum permissible average power for a given scan path.
 * Fluence scales linearly with power, so one unit-power computation
 * gives the answer directly.
 *
 * @returns {number} P_max in watts
 */
function maxPermissiblePower(beam, segments, T_s, ppd) {

    wl_nm: beam.wl_nm,
    tau_s: beam.tau_s,
    is_cw: beam.is_cw,
    prf_hz: beam.prf_hz,
    pulse_energy_J: beam.is_cw ? 0 : 1.0 / beam.prf_hz, // unit avg power

  if (!result) return 0;

  var mpe_T = skinMPE(beam.wl_nm, T_s);

  var grid = result.grid;
  var peakF = 0;
  for (var i = 0; i < grid.nx * grid.ny; i++) {
    if (grid.fluence[i] > peakF) peakF = grid.fluence[i];
  }

  // Rule 2: peakF * P ≤ mpe_T → P ≤ mpe_T / peakF
  var P_max_r2 = peakF > 0 ? mpe_T / peakF : Infinity;

  // Rule 1 (pulsed): peak single-pulse fluence = 2Ep/(πw²)×100
  // Ep = P/PRF, so H_pulse = 2P/(PRF×πw²)×100
  // H_pulse ≤ MPE(τ) → P ≤ MPE(τ) × PRF × πw² / (2×100)
  var P_max_r1 = Infinity;

    var w = beam.d_1e_mm / Math.sqrt(2);
    var mpe_tau = skinMPE(beam.wl_nm, beam.tau_s);
    P_max_r1 = mpe_tau * beam.prf_hz * Math.PI * w * w / (2 * 100);
  }

  return Math.min(P_max_r1, P_max_r2);
}

erenceDot key={"wd"+L.id} x={L.wl} y={h*pfm} r={5} fill={WC[i%WC.length]} stroke={T.bg} strokeWidth={2}/>;})}</LineChart></ResponsiveContainer></div>):(<div ref={dRef}><div style={{fontSize:11,color:T.tm,marginBottom:4}}>Per-Pulse Skin MPE ({plotFU}) vs. Duration</div><ResponsiveContainer width="100%" height={320}><LineChart data={drd.d} margin={{top:8,right:16,bottom:4,left:8}}><CartesianGrid strokeDasharray="3 3" stroke={T.gr}/><XAxis dataKey="t" type="number" scale="log" domain={[1e-9,3e4]} ticks={DTICKS} tickFormatter={dtf} tick={{fill:T.td,fontSize:10,fontFamily:"monospace"}} stroke={T.bd}/><YAxis scale="log" domain={["auto","auto"]} allowDataOverflow tickFormatter={logTick} tick={{fill:T.td,fontSize:10,fontFamily:"monospace"}} stroke={T.bd} width={65} label={{value:"Fluence, H ("+plotFU+")",angle:-90,position:"insideLeft",offset:0,style:{fontSize:10,fill:T.td,textAnchor:"middle"}}}/><RTooltip contentStyle={{background:T.tp,border:"1px solid "+T.bd,borderRadius:4,fontSize:12,fontFamily:"monospace",color:T.tx}} labelFormatter={function(v){return v!=null?ft(Number(v)):""}} formatter={function(v,n){if(v==null)return["",""];return [numFmt(Number(v),4)+" "+plotFU,String(n).replace("w","")+" nm"]}}/>{drd.ws.map(function(w,wi){var ci=0;for(var j=0;j<lasers.length;j++){if(lasers[j].wl===w&&lasers[j].show){ci=j;break;}}return <Line key={"ln"+w} dataKey={"w"+w} stroke={WC[ci%WC.length]} strokeWidth={2} dot={false} name={w+" nm"} connectNulls={true} isAnimationActive={false}/>;})}{drd.ws.length>1?<Legend wrapperStyle={{fontSize:11,fontFamily:"monospace"}}/>:null}{plotLasers.map(function(L){var i=lasers.indexOf(L);var h=skinMPE(L.wl,L.dur);if(!isFinite(h)||h<=0)return null;return <ReferenceDot key={"dd"+L.id} x={L.dur} y={h*pfm} r={5} fill={WC[i%WC.length]} stroke={T.bg} strokeWidth={2}/>;})}</LineChart></ResponsiveContainer></div>)}

/* ═══════ PA TAB ═══════ */
/* Seven ICNIRP wavelength bands for multi-band fluence chart (cf. Francis et al. Fig. 2a) */
var paUid=1;
function mkPA(wl,tau,T){return{id:paUid++,wl:wl,wlStr:String(wl),wlU:"nm",tau:tau,tauStr:String(tau*1e9),tauU:"ns",T:T,TStr:String(T),TU:"s",show:true,inTable:true};}

function PATab(p){
  var T=p.T,theme=p.theme,msg=p.msg,setMsg=p.setMsg;

  var _entries=useState([mkPA(532,5e-9,1),mkPA(800,5e-9,1),mkPA(1064,5e-9,1)]);
  var entries=_entries[0],setEntries=_entries[1];
  var _nwl=useState(""),nwl=_nwl[0],setNwl=_nwl[1];
  var _paCht=useState("snr"),paCht=_paCht[0],setPaCht=_paCht[1];
  var _cv=useState(0),cv=_cv[0],setCv=_cv[1];
  var _dr=useState(false),dirty=_dr[0],setDirty=_dr[1];
  var flRef=useRef(null),snrRef=useRef(null);

  var lb={display:"block",fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",color:T.td,marginBottom:4};
  var secH={fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",color:T.td,marginBottom:10};
  var thS={padding:"7px 10px",textAlign:"left",borderBottom:"2px solid "+T.bd,color:T.tx,fontSize:9,fontWeight:700,letterSpacing:"0.03em",whiteSpace:"nowrap"};
  var tdSt={padding:"7px 10px",fontSize:12,fontFamily:"monospace",borderBottom:"1px solid "+T.bd};
  var hSel={fontSize:9,padding:"2px 6px",background:T.bgI,border:"1px solid "+T.bd,borderRadius:4,color:T.tx,cursor:"pointer",fontWeight:700,outline:"none"};
  var ipSm={padding:"5px 8px",fontSize:12,fontFamily:"monospace",background:T.bgI,border:"1px solid "+T.bd,borderRadius:4,color:T.tx,outline:"none",boxSizing:"border-box"};

  function upE(id,key,val){setEntries(function(es){return es.map(function(e){
    if(e.id!==id)return e;var ne=Object.assign({},e);ne[key]=val;
    if(key==="wlStr"){var v=Number(val);if(isFinite(v)&&v>0){var m=1;for(var i=0;i<WL_UNITS.length;i++){if(WL_UNITS[i].id===ne.wlU)m=WL_UNITS[i].toNM;}ne.wl=v*m;}}
    if(key==="wlU"){var old=1,nw2=1;for(var i2=0;i2<WL_UNITS.length;i2++){if(WL_UNITS[i2].id===e.wlU)old=WL_UNITS[i2].toNM;if(WL_UNITS[i2].id===val)nw2=WL_UNITS[i2].toNM;}var cv2=parseFloat(e.wlStr);if(isFinite(cv2))ne.wlStr=(cv2*old/nw2).toPrecision(4);}
    if(key==="tauStr"){var v2=Number(val);if(isFinite(v2)&&v2>0){var m2=1;for(var i3=0;i3<DUR_UNITS.length;i3++){if(DUR_UNITS[i3].id===ne.tauU)m2=DUR_UNITS[i3].toS;}ne.tau=v2*m2;}}
    if(key==="tauU"){var old2=1,nw3=1;for(var i4=0;i4<DUR_UNITS.length;i4++){if(DUR_UNITS[i4].id===e.tauU)old2=DUR_UNITS[i4].toS;if(DUR_UNITS[i4].id===val)nw3=DUR_UNITS[i4].toS;}var cv3=parseFloat(e.tauStr);if(isFinite(cv3))ne.tauStr=(cv3*old2/nw3).toPrecision(4);ne.tau=ne.tau;}
    if(key==="TStr"){var v3=Number(val);if(isFinite(v3)&&v3>0){var m3=1;for(var i5=0;i5<DUR_UNITS.length;i5++){if(DUR_UNITS[i5].id===ne.TU)m3=DUR_UNITS[i5].toS;}ne.T=v3*m3;}}
    if(key==="TU"){var old3=1,nw4=1;for(var i6=0;i6<DUR_UNITS.length;i6++){if(DUR_UNITS[i6].id===e.TU)old3=DUR_UNITS[i6].toS;if(DUR_UNITS[i6].id===val)nw4=DUR_UNITS[i6].toS;}var cv4=parseFloat(e.TStr);if(isFinite(cv4))ne.TStr=(cv4*old3/nw4).toPrecision(4);ne.T=ne.T;}
    return ne;
  });});setDirty(true);}

  function addEntry(){var w=parseFloat(nwl)||800;setEntries(function(es){return es.concat([mkPA(w,5e-9,1)]);});setNwl("");setDirty(true);}
  function rmEntry(id){setEntries(function(es){return es.filter(function(e){return e.id!==id;});});setDirty(true);}
  function togShow(id){setEntries(function(es){return es.map(function(e){return e.id===id?Object.assign({},e,{show:!e.show}):e;});});}
  function togTable(id){setEntries(function(es){return es.map(function(e){return e.id===id?Object.assign({},e,{inTable:!e.inTable}):e;});});}
  function calc(){setCv(function(c){return c+1;});setDirty(false);}
  useEffect(function(){calc();},[]);

  var showEntries=entries.filter(function(e){return e.show;});

  /* PRF sample points */
  var prfPts=useMemo(function(){var pts=[];for(var le=0;le<=5.5;le+=0.04)pts.push(Math.pow(10,le));return pts;},[]);
  var PRFTICKS=[1,10,100,1e3,1e4,1e5];
  function prfFmt(v){if(v>=1e3)return(v/1e3)+"k";return String(v);}

  /* Fluence vs PRF: one curve per entry */
  var fluenceData=useMemo(function(){
    return prfPts.map(function(f){
      var row={f:f};
      for(var i=0;i<showEntries.length;i++){
        var e=showEntries[i];
        var eff=paEffFluence(e.wl,e.tau,f,e.T);
        if(isFinite(eff)&&eff>0)row["w"+i]=eff*1e3;
      }
      return row;
    });
  },[cv,showEntries,prfPts]);

  /* Crossover markers */
  var flCross=useMemo(function(){
    return showEntries.map(function(e,i){
      var fc=paOptPRF(e.wl,e.tau,e.T);
      var Hs=skinMPE(e.wl,e.tau);
      return{idx:i,f:fc,H:isFinite(Hs)?Hs*1e3:NaN};
    });
  },[cv,showEntries]);

  /* SNR vs PRF: one curve per entry */
  var snrData=useMemo(function(){
    return prfPts.map(function(f){
      var row={f:f};
      for(var i=0;i<showEntries.length;i++){
        var snr=paRelSNR(showEntries[i].wl,showEntries[i].tau,f,showEntries[i].T);
        if(isFinite(snr)&&snr>0)row["s"+i]=snr;
      }
      return row;
    });
  },[cv,showEntries,prfPts]);

  /* Optimal PRF for each entry (for table and markers) */
  var optData=useMemo(function(){
    return showEntries.map(function(e,i){
      var fopt=paOptPRF(e.wl,e.tau,e.T);
      var snrOpt=isFinite(fopt)?paRelSNR(e.wl,e.tau,fopt,e.T):NaN;
      var Nopt=isFinite(fopt)?fopt*e.T:NaN;
      var HatOpt=isFinite(fopt)?paEffFluence(e.wl,e.tau,fopt,e.T):NaN;
      return{e:e,fopt:fopt,snrOpt:snrOpt,Nopt:Nopt,HatOpt:HatOpt,idx:i};
    });
  },[cv,showEntries]);

  return (
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {/* ── Wavelength entries ── */}

/* ═══════ SCAN TAB ═══════ */
function ScanTab(p){
  var T=p.T,theme=p.theme,msg=p.msg,setMsg=p.setMsg;
  var _wl=useState("532"),wlS=_wl[0],setWlS=_wl[1]; var _wn=useState(532),wl=_wn[0],setWl=_wn[1];
  var _d=useState("1"),dS=_d[0],setDS=_d[1]; var _dn=useState(1),dia=_dn[0],setDia=_dn[1];
  var _tau=useState("10"),tauS=_tau[0],setTauS=_tau[1]; var _tn=useState(1e-8),tau=_tn[0],setTau=_tn[1];
  var _tU=useState("ns"),tauU=_tU[0],setTauU=_tU[1];
  var _prf=useState("10"),prfS=_prf[0],setPrfS=_prf[1]; var _pn=useState(10000),prf=_pn[0],setPrf=_pn[1];
  var _pfU=useState("kHz"),prfU=_pfU[0],setPrfU=_pfU[1];
  var _pw=useState("0.5"),pwS=_pw[0],setPwS=_pw[1]; var _pwn=useState(0.5),pw=_pwn[0],setPw=_pwn[1];
  var _vs=useState("100"),vS=_vs[0],setVS=_vs[1]; var _vn=useState(100),vel=_vn[0],setVel=_vn[1];
  var _pat=useState("bidi"),pat=_pat[0],setPat=_pat[1];
  var _lL=useState("20"),lLS=_lL[0],setLLS=_lL[1]; var _lLn=useState(20),lineL=_lLn[0],setLineL=_lLn[1];
  var _nL=useState("8"),nLS=_nL[0],setNLS=_nL[1]; var _nLn=useState(8),nLines=_nLn[0],setNLines=_nLn[1];
  var _ht=useState("0.5"),htS=_ht[0],setHtS=_ht[1]; var _htn=useState(0.5),hatch=_htn[0],setHatch=_htn[1];
  var _ppd=useState(8),ppd=_ppd[0],setPpd=_ppd[1];
  var _dwm=useState("gaussian"),dwm=_dwm[0],setDwm=_dwm[1];
  var _res=useState(null),res=_res[0],setRes=_res[1];
  var _cmp=useState(false),cmp=_cmp[0],setCmp=_cmp[1];
  var _dirty=useState(true),dirty=_dirty[0],setDirty=_dirty[1];
  var canRef=useRef(null);

  var lb={display:"block",fontSize:10,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",color:T.td,marginBottom:4};
  var ip={width:"100%",padding:"7px 10px",fontSize:13,fontFamily:"monospace",background:T.bgI,border:"1px solid "+T.bd,borderRadius:4,color:T.tx,outline:"none",boxSizing:"border-box"};
  var secH={fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em",color:T.td,marginBottom:10};
  var thS={padding:"5px 8px",textAlign:"left",borderBottom:"2px solid "+T.bd,color:T.td,fontSize:9,fontWeight:700};
  var tdS={padding:"5px 8px",fontSize:11,fontFamily:"monospace"};

  function upN(setS,setN,s){setS(s);var v=Number(s);if(isFinite(v))setN(v);setDirty(true);}
  function upTau(s){setTauS(s);var v=Number(s);if(isFinite(v)&&v>0){var m=1;for(var i=0;i<DUR_UNITS.length;i++){if(DUR_UNITS[i].id===tauU)m=DUR_UNITS[i].toS;}setTau(v*m);}setDirty(true);}
  function upPrf(s){setPrfS(s);var v=Number(s);if(isFinite(v)&&v>0){var m=1;for(var i=0;i<FREQ_UNITS.length;i++){if(FREQ_UNITS[i].id===prfU)m=FREQ_UNITS[i].toHz;}setPrf(v*m);}setDirty(true);}

  var _perfNote=useState(""),perfNote=_perfNote[0],setPerfNote=_perfNote[1];

  function calculate(){
    setCmp(true);setDirty(false);setPerfNote("");
    setTimeout(function(){
      var segs;
      if(pat==="linear") segs=scanBuildLinear(0,0,0,lineL,vel,dia);
      else if(pat==="bidi") segs=scanBuildBidi(0,0,lineL,nLines,hatch,vel,vel*5,dia);
      else segs=scanBuildRaster(0,0,lineL,nLines,hatch,vel,vel*5,dia);

      // ── Performance estimation ──
      // Estimate total scan time and pulse count
      var estTime=0;for(var ei=0;ei<segs.length;ei++)estTime+=dia/segs[ei].v;
      var estPulses=prf*estTime;
      var sigma=dia/(2*Math.sqrt(2)),estDx=dia/ppd;
      var trunc=Math.ceil(3*sigma/estDx);
      var estOps=estPulses*Math.PI*trunc*trunc;

      // Auto-reduce ppd if computation would be too slow (target <800ms ≈ 40M ops)
      var effPpd=ppd,notes=[];
      if(estOps>40e6&&ppd>4){
        // Find the ppd that brings ops under budget
        for(effPpd=ppd-1;effPpd>=4;effPpd--){
          var dx2=dia/effPpd,tr2=Math.ceil(3*sigma/dx2);
          if(estPulses*Math.PI*tr2*tr2<40e6)break;
        }
        effPpd=Math.max(4,effPpd);
        notes.push("Grid auto-reduced to "+effPpd+" pts/dia for "+Math.round(estPulses/1000)+"k pulses ("+Math.round(estOps/1e6)+"M ops at ppd="+ppd+")");
      }
      // Use even lower ppd for auxiliary computations
      var auxPpd=Math.min(effPpd,4);

      var Ep=prf>0?pw/prf:0;
      var isCW=prf===0&&tau===0;
      var beam={wl:wl,d:dia,tau:tau,prf:prf,Ep:Ep,P:pw,cw:isCW};
      var cr=scanCompute(beam,segs,effPpd);
      if(cr){
        var minV=isCW?(cr.st.mv||vel):0;
        var sf=scanSafety(cr.g,beam,cr.st.tt,dwm,minV);

        // Max permissible power (use low-res grid)
        var unitBeam={wl:wl,d:dia,tau:tau,prf:prf,Ep:prf>0?1/prf:0,P:1,cw:isCW};
        var unitCr=scanCompute(unitBeam,segs,auxPpd);
        var maxP=Infinity;
        if(unitCr){
          var upF=0;for(var ui=0;ui<unitCr.g.nx*unitCr.g.ny;ui++)if(unitCr.g.flu[ui]>upF)upF=unitCr.g.flu[ui];
          var mpeT=skinMPE(wl,unitCr.st.tt||cr.st.tt);
          if(upF>0)maxP=mpeT/upF;
          if(!isCW&&prf>0){var w22=dia/Math.sqrt(2);var maxPr1=skinMPE(wl,tau)*prf*Math.PI*w22*w22/(2*100);
            if(maxPr1<maxP)maxP=maxPr1;}
        }

        // Min safe velocity (use low-res grid, limit iterations)
        var minVel=0;
        var maxBisect=estPulses>100000?8:15; // fewer iterations for high PRF
        function testV(tv){
          var ts;
          if(pat==="linear")ts=scanBuildLinear(0,0,0,lineL,tv,dia);
          else if(pat==="bidi")ts=scanBuildBidi(0,0,lineL,nLines,hatch,tv,tv*5,dia);
          else ts=scanBuildRaster(0,0,lineL,nLines,hatch,tv,tv*5,dia);
          var tb={wl:wl,d:dia,tau:tau,prf:prf,Ep:Ep,P:pw,cw:isCW};
          var tcr=scanCompute(tb,ts,auxPpd);
          if(!tcr)return true;
          var tmv=isCW?(tcr.st.mv||tv):0;
          var tsf=scanSafety(tcr.g,tb,tcr.st.tt,dwm,tmv);
          return tsf.safe;
        }
        if(testV(1e6)){
          var vLo=0.01,vHi=1e6;
          for(var bi=0;bi<maxBisect&&(vHi-vLo)/vLo>0.01;bi++){
            var vMid=(vLo+vHi)/2;
            if(testV(vMid))vHi=vMid;else vLo=vMid;
          }
          minVel=vHi;
        }else{minVel=Infinity;}

        // Build pulse position array (cap at 50k for Plotly performance)
        var pulseArr=[];
        if(!isCW&&prf>0){
          var maxStorePulses=50000;
          var te2=0;
          for(var si2=0;si2<segs.length&&pulseArr.length<maxStorePulses;si2++){
            var s2=segs[si2],sd2=dia/s2.v,ts2=te2;
            var ca2=Math.cos(s2.a),sa2=Math.sin(s2.a);
            var kf2=Math.ceil(ts2*prf),klf2=(te2+sd2)*prf;
            var kl2=(klf2===Math.floor(klf2))?Math.floor(klf2)-1:Math.floor(klf2);
            for(var k2=kf2;k2<=kl2&&pulseArr.length<maxStorePulses;k2++){
              var tk2=k2/prf,fr2=(tk2-ts2)/sd2;
              pulseArr.push({t:tk2,x:s2.x+fr2*dia*ca2,y:s2.y+fr2*dia*sa2,si:si2});
            }
            te2+=sd2;
          }
          if(pulseArr.length>=maxStorePulses&&estPulses>maxStorePulses)
            notes.push("Showing first "+maxStorePulses+" of ~"+Math.round(estPulses)+" pulses in diagrams");
        }
        if(notes.length>0)setPerfNote(notes.join(". ")+".");

        setRes({g:cr.g,st:cr.st,sf:sf,segs:segs,beam:beam,maxP:maxP,minV:minVel,
          pulses:pulseArr,effPpd:effPpd});
      }
      setCmp(false);
    },60);
  }

  var _hover=useState(null),hover=_hover[0],setHover=_hover[1];

  // Draw heatmap with axes, colorbar, and scan path overlay
  var MARGIN={l:48,r:70,t:12,b:30};
  var CW=720,CH=380;
  var PW=CW-MARGIN.l-MARGIN.r,PH=CH-MARGIN.t-MARGIN.b;

  function colorMap(v){
    var ri,gi,bi;
    if(v<0.25){ri=0;gi=Math.round(v*4*255);bi=Math.round(128+127*(1-v*4));}
    else if(v<0.5){ri=0;gi=255;bi=Math.round((0.5-v)*2*255);}
    else if(v<0.75){ri=Math.round((v-0.5)*4*255);gi=255;bi=0;}
    else{ri=255;gi=Math.round((1-v)*4*255);bi=0;}
    return[ri,gi,bi];
  }

  useEffect(function(){
    if(!res||!canRef.current)return;
    var c=canRef.current,ctx=c.getContext("2d");
    var g=res.g,maxF=res.sf.pF||1;
    ctx.clearRect(0,0,CW,CH);ctx.fillStyle=T.bg;ctx.fillRect(0,0,CW,CH);

    // Draw heatmap in plot area
    var img=ctx.createImageData(g.nx,g.ny);
    for(var i=0;i<g.nx*g.ny;i++){
      var v=g.flu[i]/maxF,rgb=colorMap(v);
      var al=v>0.005?220:0;
      img.data[i*4]=rgb[0];img.data[i*4+1]=rgb[1];img.data[i*4+2]=rgb[2];img.data[i*4+3]=al;
    }
    var tmp=document.createElement("canvas");tmp.width=g.nx;tmp.height=g.ny;
    tmp.getContext("2d").putImageData(img,0,0);
    ctx.save();ctx.translate(MARGIN.l,MARGIN.t);
    ctx.scale(PW/g.nx,PH/g.ny);ctx.drawImage(tmp,0,0);ctx.restore();

    // Plot area border
    ctx.strokeStyle=T.bd;ctx.lineWidth=1;
    ctx.strokeRect(MARGIN.l,MARGIN.t,PW,PH);

    // Scan path overlay
    var xRange=g.xn+(g.nx-1)*g.dx-g.xn,yRange=g.yn+(g.ny-1)*g.dx-g.yn;
    var sx=PW/xRange,sy=PH/yRange;
    ctx.strokeStyle="rgba(255,255,255,0.4)";ctx.lineWidth=1;ctx.setLineDash([3,3]);ctx.beginPath();
    for(var si=0;si<res.segs.length;si++){
      var s=res.segs[si],px=MARGIN.l+(s.x-g.xn)*sx,py=MARGIN.t+(s.y-g.yn)*sy;
      if(si===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
    }
    var last=res.segs[res.segs.length-1];
    ctx.lineTo(MARGIN.l+(last.x+res.beam.d*Math.cos(last.a)-g.xn)*sx,MARGIN.t+(last.y+res.beam.d*Math.sin(last.a)-g.yn)*sy);
    ctx.stroke();ctx.setLineDash([]);

    // Worst point marker
    var wpx=MARGIN.l+(res.sf.wx-g.xn)*sx,wpy=MARGIN.t+(res.sf.wy-g.yn)*sy;
    ctx.strokeStyle="#D55E00";ctx.lineWidth=2;ctx.beginPath();ctx.arc(wpx,wpy,6,0,2*Math.PI);ctx.stroke();

    // Axis labels
    ctx.fillStyle=T.td;ctx.font="9px monospace";ctx.textAlign="center";
    var xMin=g.xn,xMax=g.xn+(g.nx-1)*g.dx,yMin=g.yn,yMax=g.yn+(g.ny-1)*g.dx;

    // X-axis ticks
    function niceTicks(lo,hi,n){var range=hi-lo,step=range/n,mag=Math.pow(10,Math.floor(Math.log10(step)));
      var frac=step/mag;var ns=frac<1.5?1:frac<3.5?2:frac<7.5?5:10;step=ns*mag;
      var start=Math.ceil(lo/step)*step,ticks=[];for(var v=start;v<=hi+step*0.01;v+=step)ticks.push(Math.round(v*1e6)/1e6);return ticks;}

    var xTicks=niceTicks(xMin,xMax,6);
    for(var ti=0;ti<xTicks.length;ti++){
      var tx=MARGIN.l+(xTicks[ti]-xMin)/(xMax-xMin)*PW;
      ctx.fillText(xTicks[ti].toFixed(1),tx,MARGIN.t+PH+14);
      ctx.strokeStyle=T.bd;ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(tx,MARGIN.t+PH);ctx.lineTo(tx,MARGIN.t+PH+4);ctx.stroke();
    }
    ctx.fillText("x (mm)",MARGIN.l+PW/2,MARGIN.t+PH+26);

    // Y-axis ticks
    ctx.textAlign="right";
    var yTicks=niceTicks(yMin,yMax,5);
    for(var ti2=0;ti2<yTicks.length;ti2++){
      var ty=MARGIN.t+(yTicks[ti2]-yMin)/(yMax-yMin)*PH;
      ctx.fillText(yTicks[ti2].toFixed(1),MARGIN.l-6,ty+3);
      ctx.strokeStyle=T.bd;ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(MARGIN.l,ty);ctx.lineTo(MARGIN.l-4,ty);ctx.stroke();
    }
    ctx.save();ctx.translate(10,MARGIN.t+PH/2);ctx.rotate(-Math.PI/2);ctx.textAlign="center";
    ctx.fillText("y (mm)",0,0);ctx.restore();

    // Colorbar
    var cbX=CW-MARGIN.r+14,cbW=14,cbH=PH;
    for(var cy=0;cy<cbH;cy++){
      var frac2=1-cy/cbH;var rgb2=colorMap(frac2);
      ctx.fillStyle="rgb("+rgb2[0]+","+rgb2[1]+","+rgb2[2]+")";
      ctx.fillRect(cbX,MARGIN.t+cy,cbW,1);
    }
    ctx.strokeStyle=T.bd;ctx.lineWidth=1;ctx.strokeRect(cbX,MARGIN.t,cbW,cbH);
    ctx.textAlign="left";ctx.fillStyle=T.td;ctx.font="8px monospace";
    var cbTicks=[0,0.25,0.5,0.75,1.0];
    for(var ci=0;ci<cbTicks.length;ci++){
      var cyp=MARGIN.t+cbH*(1-cbTicks[ci]);
      var cbVal=cbTicks[ci]*maxF;
      ctx.fillText(numFmt(cbVal,2),cbX+cbW+4,cyp+3);
    }
    ctx.save();ctx.translate(cbX+cbW+40,MARGIN.t+cbH/2);ctx.rotate(-Math.PI/2);ctx.textAlign="center";
    ctx.font="8px monospace";ctx.fillText("J/cm\u00b2",0,0);ctx.restore();

  },[res,T]);

  function onCanvasMove(e){
    if(!res||!canRef.current)return;
    var rect=canRef.current.getBoundingClientRect();
    var scaleX=CW/rect.width,scaleY=CH/rect.height;
    var cx=(e.clientX-rect.left)*scaleX,cy=(e.clientY-rect.top)*scaleY;
    // Check if inside plot area
    if(cx<MARGIN.l||cx>MARGIN.l+PW||cy<MARGIN.t||cy>MARGIN.t+PH){setHover(null);return;}
    var g=res.g;
    var xRange=g.xn+(g.nx-1)*g.dx-g.xn,yRange=g.yn+(g.ny-1)*g.dx-g.yn;
    var xMM=g.xn+(cx-MARGIN.l)/PW*xRange;
    var yMM=g.yn+(cy-MARGIN.t)/PH*yRange;
    var ix=Math.round((xMM-g.xn)/g.dx),iy=Math.round((yMM-g.yn)/g.dx);
    if(ix<0||ix>=g.nx||iy<0||iy>=g.ny){setHover(null);return;}
    var idx=iy*g.nx+ix;
    setHover({x:xMM,y:yMM,f:g.flu[idx],pc:g.pc[idx],pp:g.ppH[idx],rv:g.mrv[idx]});
  }

  var _vizTab=useState("fluence"),vizTab=_vizTab[0],setVizTab=_vizTab[1];
  var timRef=useRef(null),spcRef=useRef(null);

  // Plotly theme colors
  var plotBg=theme==="dark"?"#333338":"#ffffff";
  var plotGrid=theme==="dark"?"#48484f":"#e4e7eb";
  var plotText=theme==="dark"?"#a0a0a8":"#737880";
  var plotLine=theme==="dark"?"#56B4E9":"#0072B2";

  // Render Plotly timing diagram
  useEffect(function(){
    if(vizTab!=="timing"||!res||!res.pulses||!res.pulses.length||!timRef.current||typeof Plotly==="undefined")return;
    var pp=res.pulses,allN=pp.length;
    // Build stem data: vertical lines from 0 to 1 at each pulse time
    var tX=[],tY=[];
    for(var i=0;i<allN;i++){tX.push(pp[i].t,pp[i].t,null);tY.push(0,1,null);}
    // Initial zoom: first ~50 pulses
    var initEnd=pp[Math.min(49,allN-1)].t*1.15;
    var traces=[{x:tX,y:tY,type:"scatter",mode:"lines",line:{color:plotLine,width:1.2},
      fill:"tozeroy",fillcolor:theme==="dark"?"rgba(86,180,233,0.15)":"rgba(0,114,178,0.15)",
      hoverinfo:"x",name:"Pulses"}];
    var layout={
      xaxis:{title:{text:"Time",font:{size:12,family:"monospace",color:plotText}},
        rangeslider:{visible:true,thickness:0.08,bgcolor:plotBg,bordercolor:plotGrid},
        range:[0,initEnd],color:plotText,gridcolor:plotGrid,linecolor:plotGrid,
        tickfont:{size:10,family:"monospace",color:plotText},
        hoverformat:".4s",tickformat:".3s"},
      yaxis:{title:{text:"Pulse Amplitude",font:{size:11,family:"monospace",color:plotText}},
        range:[0,1.12],showticklabels:false,gridcolor:plotGrid,linecolor:plotGrid,zeroline:true,zerolinecolor:plotGrid},
      plot_bgcolor:plotBg,paper_bgcolor:"rgba(0,0,0,0)",
      margin:{l:60,r:16,t:10,b:40},
      showlegend:false,
      annotations:[{x:0.01,y:0.97,xref:"paper",yref:"paper",text:allN+" pulses total",
        showarrow:false,font:{size:10,family:"monospace",color:plotText}}]
    };
    var config={responsive:true,scrollZoom:true,displayModeBar:true,
      modeBarButtonsToRemove:["select2d","lasso2d","autoScale2d"],
      displaylogo:false};
    Plotly.react(timRef.current,traces,layout,config);
  },[res,vizTab,theme]);

  // Render Plotly fluence cross-section
  useEffect(function(){
    if(vizTab!=="spatial"||!res||!res.pulses||!res.pulses.length||!spcRef.current||typeof Plotly==="undefined")return;
    var pp=res.pulses;
    var w=dia/Math.sqrt(2); // 1/e² radius in mm
    var Ep=prf>0?pw/prf:0;
    var H0_cm2=2*Ep/(Math.PI*w*w)*100; // peak per-pulse fluence J/cm²

    // First scan line pulses
    var yLine=pp[0].y,flp=[];
    for(var fi=0;fi<pp.length;fi++){
      if(Math.abs(pp[fi].y-yLine)<dia*0.5)flp.push(pp[fi]);
      else if(flp.length>0)break;
    }
    var xMin=flp[0].x-dia*2,xMax=flp[flp.length-1].x+dia*2;
    var nPts=600,xR=xMax-xMin||1,dx2=xR/nPts;

    // Compute cumulative fluence
    var xArr=[],cumArr=[];
    var cumFlu=new Float64Array(nPts);
    for(var pi2=0;pi2<flp.length;pi2++){
      var px0=flp[pi2].x;
      for(var xi=0;xi<nPts;xi++){
        var xp=xMin+xi*dx2,r2=(xp-px0)*(xp-px0);
        cumFlu[xi]+=H0_cm2*Math.exp(-2*r2/(w*w));
      }
    }
    for(var xi2=0;xi2<nPts;xi2++){xArr.push(xMin+xi2*dx2);cumArr.push(cumFlu[xi2]);}

    // Subsample individual pulses for display (max ~25 visible)
    var step=Math.max(1,Math.floor(flp.length/25));
    var indivX=[],indivY=[];
    for(var pi3=0;pi3<flp.length;pi3+=step){
      var px02=flp[pi3].x;
      for(var xi3=0;xi3<nPts;xi3++){
        var xp2=xMin+xi3*dx2,r22=(xp2-px02)*(xp2-px02);
        var h2=H0_cm2*Math.exp(-2*r22/(w*w));
        if(h2>H0_cm2*0.001){indivX.push(xp2);indivY.push(h2);}
      }
      indivX.push(null);indivY.push(null); // separator
    }

    var mpeVal=skinMPE(wl,res.st.tt);
    var traces=[
      {x:indivX,y:indivY,type:"scatter",mode:"lines",
        line:{color:plotLine,width:0.8},opacity:0.25,
        name:"Individual pulses (1 of "+step+" shown)",hoverinfo:"skip"},
      {x:xArr,y:cumArr,type:"scatter",mode:"lines",
        line:{color:plotLine,width:2.5},fill:"tozeroy",
        fillcolor:theme==="dark"?"rgba(86,180,233,0.08)":"rgba(0,114,178,0.08)",
        name:"Cumulative ("+flp.length+" pulses)"},
    ];
    if(isFinite(mpeVal)&&mpeVal>0){
      traces.push({x:[xMin,xMax],y:[mpeVal,mpeVal],type:"scatter",mode:"lines",
        line:{color:"#d32f2f",width:2,dash:"dash"},
        name:"MPE(T="+ft(res.st.tt)+") = "+numFmt(mpeVal,3)+" J/cm\u00b2"});
    }
    var layout={
      xaxis:{title:{text:"Position along scan line (mm)",font:{size:12,family:"monospace",color:plotText}},
        rangeslider:{visible:true,thickness:0.08,bgcolor:plotBg,bordercolor:plotGrid},
        color:plotText,gridcolor:plotGrid,linecolor:plotGrid,
        tickfont:{size:10,family:"monospace",color:plotText},ticksuffix:" mm"},
      yaxis:{title:{text:"Fluence, H (J/cm\u00b2)",font:{size:12,family:"monospace",color:plotText}},
        color:plotText,gridcolor:plotGrid,linecolor:plotGrid,rangemode:"tozero",
        tickfont:{size:10,family:"monospace",color:plotText}},
      plot_bgcolor:plotBg,paper_bgcolor:"rgba(0,0,0,0)",
      margin:{l:70,r:16,t:10,b:40},
      legend:{x:0.02,y:0.98,bgcolor:"rgba(255,255,255,0.7)",bordercolor:plotGrid,borderwidth:1,
        font:{size:10,family:"monospace",color:plotText}},
      showlegend:true
    };
    var config={responsive:true,scrollZoom:true,displayModeBar:true,
      modeBarButtonsToRemove:["select2d","lasso2d","autoScale2d"],
      displaylogo:false};
    Plotly.react(spcRef.current,traces,layout,config);
  },[res,vizTab,theme,dia,wl,pw,prf]);

  return (<div style={{display:"flex",flexDirection:"column",gap:14}}>
    {/* ── Inputs: full width, 3-column ── */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>

          <div><label style={lb}>Pulse Duration</label><div style={{display:"flex",gap:4}}><input type="text" value={tauS} onChange={function(e){upTau(e.target.value)}} style={{flex:1,padding:"7px 10px",fontSize:13,fontFamily:"monospace",background:T.bgI,border:"1px solid "+T.bd,borderRadius:4,color:T.tx,outline:"none"}}/><select value={tauU} onChange={function(e){setTauU(e.target.value);upTau(tauS)}} style={{fontSize:11,padding:"4px 6px",background:T.bgI,border:"1px solid "+T.bd,borderRadius:4,color:T.tx,cursor:"pointer"}}>{DUR_UNITS.map(function(u){return <option key={u.id} value={u.id}>{u.label}</option>;})}</select></div></div>
          <div><label style={lb}>Repetition Rate</label><div style={{display:"flex",gap:4}}><input type="text" value={prfS} onChange={function(e){upPrf(e.target.value)}} style={{flex:1,padding:"7px 10px",fontSize:13,fontFamily:"monospace",background:T.bgI,border:"1px solid "+T.bd,borderRadius:4,color:T.tx,outline:"none"}}/><select value={prfU} onChange={function(e){setPrfU(e.target.value);upPrf(prfS)}} style={{fontSize:11,padding:"4px 6px",background:T.bgI,border:"1px solid "+T.bd,borderRadius:4,color:T.tx,cursor:"pointer"}}>{FREQ_UNITS.map(function(u){return <option key={u.id} value={u.id}>{u.label}</option>;})}</select></div></div>
          <div><label style={lb}>Average Power (W)</label><input type="text" value={pwS} onChange={function(e){upN(setPwS,setPw,e.target.value)}} style={ip}/></div>
        </div>
      </div>
      <div style={{background:T.card,borderRadius:6,border:"1px solid "+T.bd,padding:14}}>
        <div style={secH}>Scan Pattern</div>

            return <button key={pt[0]} onClick={function(){setPat(pt[0]);setDirty(true)}} style={{flex:1,padding:"6px 8px",fontSize:11,fontWeight:pat===pt[0]?700:500,background:pat===pt[0]?T.ac:"transparent",color:pat===pt[0]?"#fff":T.tm,border:pat===pt[0]?"none":"1px solid "+T.bd,borderRadius:4,cursor:"pointer"}}>{pt[1]}</button>;

            </div>

          <div>
            <label style={lb}>Dwell Time Definition</label>

              {[["gaussian","Gaussian"],["geometric","Geometric"]].map(function(dm){
                return <button key={dm[0]} onClick={function(){setDwm(dm[0])}} style={{flex:1,padding:"5px 8px",fontSize:10,fontWeight:dwm===dm[0]?700:500,background:dwm===dm[0]?T.ac:"transparent",color:dwm===dm[0]?"#fff":T.tm,border:dwm===dm[0]?"none":"1px solid "+T.bd,borderRadius:4,cursor:"pointer"}}>{dm[1]}</button>;

    {/* ── Tabbed Visualization ── */}

        {res?<div style={{fontSize:9,color:T.td,fontFamily:"monospace"}}>Grid: {res.g.nx}{"\u00d7"}{res.g.ny} {"\u00b7"} Pulses: {res.pulses?res.pulses.length:res.st.tp||0}</div>:null}
