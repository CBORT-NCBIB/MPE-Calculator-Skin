      peakF = analyticalPeak;
      analyticalUsed = true;
      // Recompute Rule 2 ratio with analytical peak
      if (isFinite(mpe_T) && mpe_T > 0) {
        var analyticalR2 = analyticalPeak / mpe_T;
        if (analyticalR2 > worstR2) worstR2 = analyticalR2;
        if (analyticalR2 > worstVal) worstVal = analyticalR2;
      }
    }
  }

  // Rule 1 analytical cross-check: exact peak single-pulse fluence
  // (independent of grid — uses beam physics directly)
  if (!beam.is_cw && beam.pulse_energy_J > 0) {
    var w_r1 = beam.d_1e_mm / Math.sqrt(2);
    var H0_exact = 2 * beam.pulse_energy_J / (Math.PI * w_r1 * w_r1) * 100;
    var r1_exact = isFinite(rule1_limit) && rule1_limit > 0 ? H0_exact / rule1_limit : 0;
    if (r1_exact > worstR1) {
      worstR1 = r1_exact;
      if (r1_exact > worstVal) worstVal = r1_exact;
    }
  }

  var worstIx = worstIdx % grid.nx;
  var worstIy = (worstIdx - worstIx) / grid.nx;

  // Revisit timing statistics
  var globalMinRevisit = 1e30;
  var revisitPoints = 0;
  for (var ri = 0; ri < n; ri++) {
    if (grid.min_revisit_s[ri] < 1e29) {
      revisitPoints++;
      if (grid.min_revisit_s[ri] < globalMinRevisit)
        globalMinRevisit = grid.min_revisit_s[ri];
    }
  }
  if (globalMinRevisit >= 1e29) globalMinRevisit = Infinity;

  var kappa_skin = KAPPA_SKIN_MM2_S;
  var thermal_relax_s = (beam.d_1e_mm * beam.d_1e_mm) / (4 * kappa_skin);

  return {
    safe: worstR1 <= 1.0 && worstR2 <= 1.0,
    worst_ratio: worstVal,
    worst_x_mm: grid.x_min_mm + worstIx * grid.dx_mm,
    worst_y_mm: grid.y_min_mm + worstIy * grid.dx_mm,
    binding_rule: worstR1 >= worstR2 ? "Rule 1" : "Rule 2",
    safety_margin: 1.0 - worstVal,
    mpe_tau: mpe_tau,
    mpe_T: mpe_T,
    peak_fluence: peakF,
    peak_pulse_H_max: grid.peak_pulse_H[worstIdx],
    max_pulses: maxPulses,
    rule1_max_ratio: worstR1,
    rule2_max_ratio: worstR2,
    min_revisit_s: globalMinRevisit,
    revisit_points: revisitPoints,
    thermal_relax_s: thermal_relax_s,
    revisit_adequate: globalMinRevisit >= thermal_relax_s,
    analytical_peak: analyticalPeak,
    analytical_used: analyticalUsed
  };
}

// ── Minimum safe velocity (bisection search) ────────────────────

/**
 * Find the minimum scan velocity that keeps all points within MPE.
 *
 * Uses bisection: at each candidate velocity, rebuilds the scan path,
 * computes the fluence grid, and evaluates safety.
 *
 * @param {Object} beam - BeamParams (wl_nm, d_1e_mm, tau_s, prf_hz, avg_power_W, is_cw)
 * @param {string} pattern - "linear", "bidi", or "raster"
 * @param {Object} patParams - Pattern parameters (line_length_mm, n_lines, hatch_mm, etc.)
 * @param {number} T_s - Total exposure window in seconds (0 = use scan time)
 * @param {number} ppd - Points per diameter
 * @param {string} dwell_mode - "gaussian" or "geometric"
 * @returns {Object} { v_min, safe_at_vmin, iterations }
 */
function minSafeVelocity(beam, pattern, patParams, T_s, ppd, dwell_mode) {
  ppd = ppd || 8;
  dwell_mode = dwell_mode || "gaussian";

  function testVelocity(v) {
    var segs;
    var d = beam.d_1e_mm || beam.d;
    var jv = v * 5; // jump velocity = 5× scan velocity
    if (pattern === "linear") {
      segs = buildLinearScan(0, 0, 0, patParams.line_length_mm, v, d);
    } else if (pattern === "bidi") {
      segs = buildBidiRasterScan(0, 0, patParams.line_length_mm,
        patParams.n_lines, patParams.hatch_mm, v, jv, d);
    } else {
      segs = buildRasterScan(0, 0, patParams.line_length_mm,
        patParams.n_lines, patParams.hatch_mm, v, jv, d);
    }
    if (!segs || segs.length === 0) return { safe: true };

    var grid = createFluenceGrid(d, segs, ppd);
    var stats;
    if (beam.is_cw) {
      stats = computeScanFluenceCW(grid, d, beam.avg_power_W || beam.P, segs);
    } else {
      var Ep = beam.pulse_energy_J || beam.Ep ||
        (beam.avg_power_W || beam.P) / (beam.prf_hz || beam.prf);
      stats = computeScanFluencePulsed(grid, d, beam.prf_hz || beam.prf, Ep, segs);
    }
    var T = T_s > 0 ? T_s : stats.total_time_s;
    var mv = beam.is_cw ? (stats.min_velocity || v) : 0;
    return evaluateScanSafety(grid, beam.is_cw ?
      { wl_nm: beam.wl_nm || beam.wl, d_1e_mm: d, is_cw: true } :
      { wl_nm: beam.wl_nm || beam.wl, d_1e_mm: d, tau_s: beam.tau_s || beam.tau, is_cw: false },
      T, dwell_mode, mv);
  }

  var vLow = 0.01, vHigh = 1e6;
  var iterations = 0;

  // First check: is the problem solvable at all?
  var highTest = testVelocity(vHigh);
  if (!highTest.safe) {
    return { v_min: Infinity, safe_at_vmin: false, iterations: 0 };
  }

  // Bisect
  while ((vHigh - vLow) / vLow > 0.001 && iterations < 50) {
    var vMid = (vLow + vHigh) / 2;
    var result = testVelocity(vMid);
    if (result.safe) vHigh = vMid;
    else vLow = vMid;
    iterations++;
  }

  return { v_min: vHigh, safe_at_vmin: true, iterations: iterations };
}

// ── Closed-form inverse functions ───────────────────────────────

/**
 * Maximum permissible pulse energy from Rule 1 alone.
 * Independent of scan geometry — depends only on beam diameter,
 * wavelength, and pulse duration.
 *
 * Physics: H_pulse = 2·Ep/(π·w²) [J/mm²] × 100 [→ J/cm²]
 *          H_pulse ≤ MPE(τ)
 *          Ep ≤ MPE(τ) × π·w² / 200
 *
 * @param {number} wl_nm - Wavelength in nm
 * @param {number} d_1e_mm - 1/e beam diameter in mm
 * @param {number} tau_s - Pulse duration in seconds
 * @returns {number} Maximum pulse energy in joules
 */
function maxPulseEnergy(wl_nm, d_1e_mm, tau_s) {
  var w = d_1e_mm / Math.sqrt(2); // 1/e² radius in mm
  var mpe_tau = skinMPE(wl_nm, tau_s);
  return mpe_tau * Math.PI * w * w / 200;
}

/**
 * Minimum repetition rate from Rule 1 at a given average power.
 * Below this PRF, individual pulse energy exceeds the single-pulse MPE.
 *
 * Physics: Ep = P/PRF, H_pulse = 2P/(PRF·π·w²) × 100
 *          H_pulse ≤ MPE(τ)
 *          PRF ≥ 200·P / (π·w²·MPE(τ))
 *
 * Note: Rule 2 (cumulative) is PRF-independent at fixed power because
 * N_pulses × H_pulse = (PRF·t_dwell) × 2P/(PRF·π·w²) × 100
 *                     = 2P·t_dwell/(π·w²) × 100
 * The PRF cancels, so only Rule 1 constrains the minimum PRF.
 *
 * @param {number} wl_nm - Wavelength in nm
 * @param {number} d_1e_mm - 1/e beam diameter in mm
 * @param {number} tau_s - Pulse duration in seconds
 * @param {number} avg_power_W - Average power in watts
 * @returns {number} Minimum repetition rate in Hz
 */
function minRepRate(wl_nm, d_1e_mm, tau_s, avg_power_W) {
  var w = d_1e_mm / Math.sqrt(2);
  var mpe_tau = skinMPE(wl_nm, tau_s);
  if (mpe_tau <= 0) return Infinity;
  return 200 * avg_power_W / (Math.PI * w * w * mpe_tau);
}

// ── Scan path builders ──────────────────────────────────────────

/**
 * Build a linear (straight-line) scan path.
 * @returns {Array} ScanSegment[]
 */
function buildLinearScan(x0, y0, angle_rad, total_length_mm, v_mm_s, d_1e_mm) {
  if (!isFinite(v_mm_s) || v_mm_s <= 0) return [];
  if (!isFinite(d_1e_mm) || d_1e_mm <= 0) return [];
  if (!isFinite(total_length_mm) || total_length_mm <= 0) return [];
  var n = Math.round(total_length_mm / d_1e_mm);
  if (n < 1) n = 1;
  var cos_a = Math.cos(angle_rad), sin_a = Math.sin(angle_rad);
  var segs = [];
  for (var i = 0; i < n; i++) {
    segs.push({
      x_start_mm: x0 + i * d_1e_mm * cos_a,
      y_start_mm: y0 + i * d_1e_mm * sin_a,
      angle_rad: angle_rad,
      v_mm_s: v_mm_s
    });
  }
  return segs;
}

/**
 * Build a bidirectional raster scan path.
 * Alternating scan directions, connected by perpendicular jumps.
 * @returns {Array} ScanSegment[]
 */
function buildBidiRasterScan(x0, y0, line_length_mm, n_lines, hatch_mm,
                             scan_v_mm_s, jump_v_mm_s, d_1e_mm, blanking) {
  if (!isFinite(n_lines) || n_lines < 1) return [];
  if (!isFinite(hatch_mm) || hatch_mm <= 0) hatch_mm = d_1e_mm; // default to 1 beam width
  if (!isFinite(scan_v_mm_s) || scan_v_mm_s <= 0) return [];
  if (!isFinite(jump_v_mm_s) || jump_v_mm_s <= 0) jump_v_mm_s = scan_v_mm_s;
  var segs = [];
  for (var j = 0; j < n_lines; j++) {
    var line_y = y0 + j * hatch_mm;
    if (j % 2 === 0) {
      // Left to right
      var lineSegs = buildLinearScan(x0, line_y, 0, line_length_mm,
        scan_v_mm_s, d_1e_mm);
      for (var k = 0; k < lineSegs.length; k++) segs.push(lineSegs[k]);
    } else {
      // Right to left
      var lineSegs2 = buildLinearScan(x0 + line_length_mm, line_y, Math.PI,
        line_length_mm, scan_v_mm_s, d_1e_mm);
      for (var k2 = 0; k2 < lineSegs2.length; k2++) segs.push(lineSegs2[k2]);
    }
    // Jump to next line (if not last)
    if (j < n_lines - 1) {
      var jumpEnd_x = (j % 2 === 0) ? x0 + line_length_mm : x0;
      var jumpSegs = buildLinearScan(jumpEnd_x, line_y, Math.PI / 2,
        hatch_mm, jump_v_mm_s, d_1e_mm);
      for (var k3 = 0; k3 < jumpSegs.length; k3++) {
        var js = jumpSegs[k3];
        if (blanking) js.blanked = true;
        segs.push(js);
      }
    }
  }
  return segs;
}

/**
 * Build a unidirectional raster scan path.
 * All lines scan in the same direction; beam returns before each new line.
 * @returns {Array} ScanSegment[]
 */
function buildRasterScan(x0, y0, line_length_mm, n_lines, hatch_mm,
                         scan_v_mm_s, jump_v_mm_s, d_1e_mm, blanking) {
  if (!isFinite(n_lines) || n_lines < 1) return [];
  if (!isFinite(hatch_mm) || hatch_mm <= 0) hatch_mm = d_1e_mm;
  if (!isFinite(scan_v_mm_s) || scan_v_mm_s <= 0) return [];
  if (!isFinite(jump_v_mm_s) || jump_v_mm_s <= 0) jump_v_mm_s = scan_v_mm_s;
  var segs = [];
  for (var j = 0; j < n_lines; j++) {
    var line_y = y0 + j * hatch_mm;
    // Scan left to right
    var lineSegs = buildLinearScan(x0, line_y, 0, line_length_mm,
      scan_v_mm_s, d_1e_mm);
    for (var k = 0; k < lineSegs.length; k++) segs.push(lineSegs[k]);

    if (j < n_lines - 1) {
      // Return right to left (fast jump)
      var retSegs = buildLinearScan(x0 + line_length_mm, line_y, Math.PI,
        line_length_mm, jump_v_mm_s, d_1e_mm);
      for (var k2 = 0; k2 < retSegs.length; k2++) {
        var rs = retSegs[k2];
        if (blanking) rs.blanked = true;
        segs.push(rs);
      }
      // Step down to next line
      var stepSegs = buildLinearScan(x0, line_y, Math.PI / 2,
        hatch_mm, jump_v_mm_s, d_1e_mm);
      for (var k3 = 0; k3 < stepSegs.length; k3++) {
        var ss = stepSegs[k3];
        if (blanking) ss.blanked = true;
        segs.push(ss);
      }
    }
  }
  return segs;
}

/**
 * Build a scan path from a list of waypoints.
 * Each waypoint: { x_mm, y_mm, v_mm_s }
 * The path between consecutive waypoints is decomposed into
 * beam-diameter segments.
 * @returns {Array} ScanSegment[]
 */
function buildCustomScan(waypoints, d_1e_mm) {
  var segs = [];
  for (var i = 0; i < waypoints.length - 1; i++) {
    var wp0 = waypoints[i], wp1 = waypoints[i + 1];
    var dxx = wp1.x_mm - wp0.x_mm;
    var dyy = wp1.y_mm - wp0.y_mm;
    var dist = Math.sqrt(dxx * dxx + dyy * dyy);
    if (dist < 1e-12) continue;
    var angle = Math.atan2(dyy, dxx);
    var v = wp0.v_mm_s;

    var n_seg = Math.round(dist / d_1e_mm);
    if (n_seg < 1) n_seg = 1;
    var actual_len = dist / n_seg;
    var cos_a = Math.cos(angle), sin_a = Math.sin(angle);

    for (var k = 0; k < n_seg; k++) {
      segs.push({
        x_start_mm: wp0.x_mm + k * actual_len * cos_a,
        y_start_mm: wp0.y_mm + k * actual_len * sin_a,
        angle_rad: angle,
        v_mm_s: v
      });
    }
  }
  return segs;
}

// ── Inverse functions ───────────────────────────────────────────

/**
 * Maximum permissible average power for a given scan path.
 * Fluence scales linearly with power, so one unit-power computation
 * gives the answer directly.
 *
 * @returns {number} P_max in watts
 */
function maxPermissiblePower(beam, segments, T_s, ppd) {
  // Compute fluence with unit power
  var unitBeam = {
    d_1e_mm: beam.d_1e_mm,
    wl_nm: beam.wl_nm,
    tau_s: beam.tau_s,
    is_cw: beam.is_cw,
    prf_hz: beam.prf_hz,
    pulse_energy_J: beam.is_cw ? 0 : 1.0 / beam.prf_hz, // unit avg power
    avg_power_W: 1.0
  };

  var result = computeScanFluence(unitBeam, segments, ppd);
  if (!result) return 0;

  var mpe_T = skinMPE(beam.wl_nm, T_s);

  // Find peak fluence at unit power
  var grid = result.grid;
  var peakF = 0;
  for (var i = 0; i < grid.nx * grid.ny; i++) {
    if (grid.fluence[i] > peakF) peakF = grid.fluence[i];
  }

  // Rule 2: peakF * P ≤ mpe_T → P ≤ mpe_T / peakF
  var P_max_r2 = peakF > 0 ? mpe_T / peakF : Infinity;

  // Rule 1 (pulsed): peak single-pulse fluence = 2Ep/(πw²)×100
  // Ep = P/PRF, so H_pulse = 2P/(PRF×πw²)×100
  // H_pulse ≤ MPE(τ) → P ≤ MPE(τ) × PRF × πw² / (2×100)
  var P_max_r1 = Infinity;
  if (!beam.is_cw && beam.prf_hz > 0) {
    var w = beam.d_1e_mm / Math.sqrt(2);
    var mpe_tau = skinMPE(beam.wl_nm, beam.tau_s);
    P_max_r1 = mpe_tau * beam.prf_hz * Math.PI * w * w / (2 * 100);
  }

  return Math.min(P_max_r1, P_max_r2);
}

// ── End scanning engine ─────────────────────────────────────────
// ── Environment detection and exports ───────────────────────────
// Node.js: load JSON and export module. Browser/Worker: set _global.MPEEngine.
// build.py strips the Node.js block (BUILD_STRIP_START → BUILD_STRIP_END)
// so the browser build only contains the _global.MPEEngine assignment.

{
  // Browser or Web Worker: standard data must be set via loadStandard()
  // (the HTML build script will call this with inlined JSON)

  var _global = (typeof self !== "undefined") ? self : (typeof window !== "undefined") ? window : this;
  _global.MPEEngine = {
    // Constants
    GAUSS_TRUNCATION_SIGMA: GAUSS_TRUNCATION_SIGMA,

    OP_BUDGET: OP_BUDGET,
    MAX_VIZ_PULSES: MAX_VIZ_PULSES,
    loadStandard: loadStandard,
    getStandard: getStandard,
    CA: CA,
    isInCARange: isInCARange,
    isIrrPrimary: isIrrPrimary,
    getLargeAreaCorrection: getLargeAreaCorrection,
    largeAreaIrradianceLimit: largeAreaIrradianceLimit,
    getValidationErrors: getValidationErrors,
    skinMPE: skinMPE,
    skinMPE_area: skinMPE_area,
    repPulse: repPulse,
    repPulse_area: repPulse_area,
    bandName: bandName,
    get STANDARD() { return getSTANDARD(); },
    paEffFluence: paEffFluence,
    paRelSNR: paRelSNR,
    paOptimalPRF: paOptimalPRF,
    getAperture: getAperture,
    beamEval: beamEval,
    // Scanning engine (separable θ₃ approach)
    canUseSeparable: canUseSeparable,
    computeScanFluenceSeparable: computeScanFluenceSeparable,
    // Scanning engine (brute-force and CW)
    scanDwellGaussian: scanDwellGaussian,
    scanDwellGeometric: scanDwellGeometric,
    createFluenceGrid: createFluenceGrid,
    createFluenceGridFromParams: createFluenceGridFromParams,
    MAX_SEGMENTS: MAX_SEGMENTS,
    computeScanFluencePulsed: computeScanFluencePulsed,
    computeScanFluenceCW: computeScanFluenceCW,
    segmentFluenceErf: segmentFluenceErf,
    overlapParameter: overlapParameter,
    computeScanFluenceSegmentErf: computeScanFluenceSegmentErf,
    computeScanFluence: computeScanFluence,
    analyticalPeakFluence: analyticalPeakFluence,
    evaluateScanSafety: evaluateScanSafety,
    buildLinearScan: buildLinearScan,
    buildBidiRasterScan: buildBidiRasterScan,
    buildRasterScan: buildRasterScan,
    buildCustomScan: buildCustomScan,
    buildPathSegments: buildPathSegments,
    maxPermissiblePower: maxPermissiblePower,
    minSafeVelocity: minSafeVelocity,
    maxPulseEnergy: maxPulseEnergy,
    minRepRate: minRepRate
  };
}

<script>
// LSP-JSON schema (web/lsp/schema.json) inlined for main-thread Stage 1
// validation.  The validator (loaded immediately below) reads this from
// the global via window.LSP_SCHEMA — see web/lsp/validate.js for the
// resolution order.
var LSP_SCHEMA = {
  "$schema": "https://json-schema.org/draft/2020-12/schema",
  "$id": "https://cbort-ncbib.github.io/MPE-Calculator-Skin/schemas/lsp-1.0.0.schema.json",
  "title": "Laser Scan Pattern (LSP) Document",
  "description": "Canonical exchange format for arbitrary laser scan patterns with embedded MPE-relevant metadata. Version 1.0.0 of the schema. Compatibility policy: minor versions (1.x) add optional fields only; patch versions (1.0.x) fix wording or examples without changing semantics; major versions (2.x) may rename or remove. Unknown top-level keys in input documents are preserved by readers but may be warned about.",
  "type": "object",
  "required": ["lsp_version", "meta", "laser", "exposure", "pattern"],
  "additionalProperties": true,
  "properties": {

    "lsp_version": {
      "description": "SemVer string identifying the schema version this document conforms to. Readers should accept any 1.x.x document and may warn on unknown patches.",
      "type": "string",
      "pattern": "^[0-9]+\\.[0-9]+\\.[0-9]+$"
    },

    "lsp_schema": {
      "description": "Optional URL of the JSON Schema document this LSP document was authored against. Informational only; validators use lsp_version to resolve the schema.",
      "type": "string",
      "format": "uri"
    },

    "meta": {
      "description": "Document-level metadata: identity, units, coordinate frame, bounding box.",
      "type": "object",
      "required": ["units"],
      "additionalProperties": true,
      "properties": {
        "name": {
          "description": "Human-readable name for the pattern.",
          "type": "string",
          "maxLength": 256
        },
        "description": {
          "description": "Free-form description of the pattern's intent and provenance.",
          "type": "string",
          "maxLength": 4096
        },
        "created": {
          "description": "ISO 8601 timestamp at which the document was created.",
          "type": "string",
          "format": "date-time"
        },
        "author": {
          "description": "Author or originating institution.",
          "type": "string",
          "maxLength": 256
        },
        "source_tool": {
          "description": "Name and version of the tool that emitted this document.",
          "type": "string",
          "maxLength": 256
        },
        "coordinate_frame": {
          "description": "Interpretation of the (x, y) coordinates. sample_plane is the default and means physical coordinates at the imaging plane. scanner_angle means mechanical scanner angles in radians. galvo_voltage means raw drive voltages.",
          "type": "string",
          "enum": ["sample_plane", "scanner_angle", "galvo_voltage"],
          "default": "sample_plane"
        },
        "units": {
          "description": "Declared physical units for the document. Required because the most common source of MPE error is a silent unit confusion.",
          "type": "object",
          "required": ["length", "time", "power"],
          "additionalProperties": false,
          "properties": {
            "length": {
              "description": "Unit for spatial coordinates and beam diameter.",
              "type": "string",
              "enum": ["mm", "um", "rad", "V"]
            },
            "time": {
              "description": "Unit for durations and time-sampled axes.",
              "type": "string",
              "enum": ["s", "ms", "us", "ns"]
            },
            "power": {
              "description": "Unit for laser power.",
              "type": "string",
              "enum": ["W", "mW", "normalized", "percent"]
            },
            "wavelength": {
              "description": "Unit for laser wavelength. Defaults to nm.",
              "type": "string",
              "enum": ["nm", "um"],
              "default": "nm"
            }
          }
        },
        "origin": {
          "description": "Optional document origin in declared length units. Defaults to [0, 0].",
          "type": "array",
          "items": { "type": "number" },
          "minItems": 2,
          "maxItems": 2
        },
        "extent_bbox": {
          "description": "Optional bounding box [[x_min, y_min], [x_max, y_max]] in declared length units. Used by validators to flag out-of-range coordinates.",
          "type": "array",
          "minItems": 2,
          "maxItems": 2,
          "items": {
            "type": "array",
            "minItems": 2,
            "maxItems": 2,
            "items": { "type": "number" }
          }
        }
      }
    },

    "laser": {
      "description": "Laser source parameters required for MPE evaluation.",
      "type": "object",
      "required": ["wavelength_nm", "beam_diameter_mm", "pulse_mode"],
      "additionalProperties": false,
      "properties": {
        "wavelength_nm": {
          "description": "Center wavelength in nanometers. ICNIRP 2013 valid range is 180 to 1,000,000 nm.",
          "type": "number",
          "minimum": 180,
          "maximum": 1000000
        },
        "beam_diameter_mm": {
          "description": "Beam diameter at the exposure plane in millimeters, using the definition specified in beam_diameter_definition.",
          "type": "number",
          "exclusiveMinimum": 0,
          "maximum": 1000
        },
        "beam_diameter_definition": {
          "description": "Definition under which the beam diameter is reported. The engine assumes 1/e^2 intensity by default.",
          "type": "string",
          "enum": ["FWHM", "1/e^2_intensity", "1/e_field"],
          "default": "1/e^2_intensity"
        },
        "pulse_mode": {
          "description": "cw indicates a continuous-wave laser. pulsed requires the pulse object to be populated.",
          "type": "string",
          "enum": ["cw", "pulsed"]
        },
        "pulse": {
          "description": "Pulsed-laser parameters. Required when pulse_mode is pulsed; ignored when pulse_mode is cw.",
          "oneOf": [
            { "type": "null" },
            {
              "type": "object",
              "required": ["repetition_rate_hz", "pulse_duration_s"],
              "additionalProperties": false,
              "properties": {
                "repetition_rate_hz": {
                  "description": "Pulse repetition frequency in Hz. Must be positive.",
                  "type": "number",
                  "exclusiveMinimum": 0
                },
                "pulse_duration_s": {
                  "description": "Single-pulse duration in seconds. Must be positive.",
                  "type": "number",
                  "exclusiveMinimum": 0
                },
                "pulse_energy_j": {
                  "description": "Optional explicit per-pulse energy in joules. If absent, computed from segment power and repetition rate.",
                  "type": "number",
                  "exclusiveMinimum": 0
                }
              }
            }
          ]
        }
      }
    },

    "exposure": {
      "description": "Exposure-window parameters required for MPE evaluation under ICNIRP 2013 Rule 2.",
      "type": "object",
      "required": ["tissue", "exposure_duration_s"],
      "additionalProperties": false,
      "properties": {
        "tissue": {
          "description": "Target tissue. Only skin is currently supported by the MPE engine.",
          "type": "string",
          "enum": ["skin"]
        },
        "exposure_duration_s": {
          "description": "Total exposure window in seconds. Used as the time argument to MPE(t) in Rule 2.",
          "type": "number",
          "exclusiveMinimum": 0,
          "maximum": 86400
        },
        "aperture_mm": {
          "description": "Optional ICNIRP averaging aperture in millimeters. If absent, the engine's default for the chosen tissue is used.",
          "type": "number",
          "exclusiveMinimum": 0,
          "maximum": 100
        }
      }
    },

    "pattern": {
      "description": "The scan pattern itself. Either segments, samples, or parameterized must be populated, as indicated by representation.",
      "type": "object",
      "required": ["representation", "authoritative"],
      "additionalProperties": false,
      "properties": {

        "representation": {
          "description": "Which structural form this pattern is encoded in. segments is a piecewise-constant event list. samples is a dense time-sampled waveform. hybrid means both are present and the authoritative field disambiguates.",
          "type": "string",
          "enum": ["segments", "samples", "hybrid"]
        },

        "authoritative": {
          "description": "Which encoding is canonical on round-trip when more than one is present.",
          "type": "string",
          "enum": ["segments", "samples", "parameterized"]
        },

        "default_velocity_mm_s": {
          "description": "Optional default velocity in mm/s applied to any segment that omits an explicit velocity. Ignored when representation is samples.",
          "type": "number",
          "exclusiveMinimum": 0
        },

        "default_power_w": {
          "description": "Optional default power in watts applied to any segment that omits an explicit power. Ignored when representation is samples.",
          "type": "number",
          "minimum": 0
        },

        "loop": {
          "description": "Optional looping policy. enabled false means the pattern is single-shot; otherwise count specifies the number of repetitions and frame_gap_s the blanked dwell between them.",
          "type": "object",
          "additionalProperties": false,
          "properties": {
            "enabled": { "type": "boolean", "default": false },
            "count": { "type": "integer", "minimum": 1, "default": 1 },
            "frame_gap_s": { "type": "number", "minimum": 0, "default": 0 }
          }
        },

        "segments": {
          "description": "Ordered list of scan segments. Required when representation is segments or hybrid.",
          "oneOf": [
            { "type": "null" },
            {
              "type": "array",
              "minItems": 1,
              "items": { "$ref": "#/$defs/Segment" }
            }
          ]
        },

        "samples": {
          "description": "Time-sampled waveform. Required when representation is samples or hybrid.",
          "oneOf": [
            { "type": "null" },
            { "$ref": "#/$defs/Samples" }
          ]
        },

        "parameterized": {
          "description": "Editor-only parameterized shape definitions. Preserved on round-trip but never the source of truth for computation; the segments or samples blocks must be regenerated whenever parameterized is edited.",
          "oneOf": [
            { "type": "null" },
            {
              "type": "array",
              "items": { "$ref": "#/$defs/ParameterizedShape" }
            }
          ]
        },

        "sidecar": {
          "description": "Optional reference to an external file holding the dense arrays. Reserved for Phase 2 HDF5 sidecar support.",
          "oneOf": [
            { "type": "null" },
            {
              "type": "object",
              "required": ["type", "href"],
              "additionalProperties": false,
              "properties": {
                "type": { "type": "string", "enum": ["hdf5", "npz", "csv"] },
                "href": { "type": "string" },
                "dataset_map": { "type": "object" }
              }
            }
          ]
        }
      },

      "allOf": [
        {
          "if": { "properties": { "representation": { "const": "segments" } } },
          "then": {
            "required": ["segments"],
            "properties": {
              "segments": { "type": "array", "minItems": 1 }
            }
          }
        },
        {
          "if": { "properties": { "representation": { "const": "samples" } } },
          "then": {
            "required": ["samples"],
            "properties": {
              "samples": { "$ref": "#/$defs/Samples" }
            }
          }
        },
        {
          "if": { "properties": { "representation": { "const": "hybrid" } } },
          "then": {
            "required": ["segments", "samples"],
            "properties": {
              "segments": { "type": "array", "minItems": 1 },
              "samples": { "$ref": "#/$defs/Samples" }
            }
          }
        }
      ]
    },

    "validation_hints": {
      "description": "Optional bounds the authoring tool believes its pattern stays within. The validator uses these to reject malformed or adversarial inputs early.",
      "type": "object",
      "additionalProperties": false,
      "properties": {
        "max_velocity_mm_per_s": { "type": "number", "exclusiveMinimum": 0 },
        "max_power_w": { "type": "number", "minimum": 0 },
        "expected_total_duration_s": { "type": "number", "exclusiveMinimum": 0 }
      }
    }
  },

  "$defs": {

    "Velocity": {
      "description": "Velocity specification for a single segment. Three modes are supported.",
      "oneOf": [
        {
          "description": "Constant velocity over the entire segment.",
          "type": "object",
          "required": ["mode", "value_mm_per_s"],
          "additionalProperties": false,
          "properties": {
            "mode": { "const": "constant" },
            "value_mm_per_s": { "type": "number", "exclusiveMinimum": 0 }
          }
        },
        {
          "description": "Linear velocity ramp between v_start and v_end over the segment's parametric length.",
          "type": "object",
          "required": ["mode", "v_start_mm_per_s", "v_end_mm_per_s"],
          "additionalProperties": false,
          "properties": {
            "mode": { "const": "linear_ramp" },
            "v_start_mm_per_s": { "type": "number", "exclusiveMinimum": 0 },
            "v_end_mm_per_s": { "type": "number", "exclusiveMinimum": 0 }
          }
        },
        {
          "description": "Inherit from pattern.default_velocity_mm_s.",
          "type": "object",
          "required": ["mode"],
          "additionalProperties": false,
          "properties": {
            "mode": { "const": "inherit" }
          }
        }
      ]
    },

    "Power": {
      "description": "Optical power specification for a single segment.",
      "oneOf": [
        {
          "description": "Constant power over the entire segment.",
          "type": "object",
          "required": ["mode", "value"],
          "additionalProperties": false,
          "properties": {
            "mode": { "const": "constant" },
            "value": { "type": "number", "minimum": 0 }
          }
        },
        {
          "description": "Linear power ramp between start and end values over the segment's parametric length.",
          "type": "object",
          "required": ["mode", "value_start", "value_end"],
          "additionalProperties": false,
          "properties": {
            "mode": { "const": "linear_ramp" },
            "value_start": { "type": "number", "minimum": 0 },
            "value_end": { "type": "number", "minimum": 0 }
          }
        },
        {
          "description": "Inherit from pattern.default_power_w.",
          "type": "object",
          "required": ["mode"],
          "additionalProperties": false,
          "properties": {
            "mode": { "const": "inherit" }
          }
        }
      ]
    },

    "Segment": {
      "description": "One element of a scan pattern's segment list. type discriminates the geometry.",
      "type": "object",
      "required": ["id", "type"],
      "additionalProperties": false,
      "properties": {
        "id": { "type": "integer", "minimum": 0 },
        "type": { "type": "string", "enum": ["line", "arc", "dwell", "move"] },
        "p0": {
          "description": "Start point [x, y] in declared length units.",
          "type": "array",
          "items": { "type": "number" },
          "minItems": 2,
          "maxItems": 2
        },
        "p1": {
          "description": "End point [x, y] in declared length units. Required for line and move; required for arc as the endpoint; absent for dwell.",
          "type": "array",
          "items": { "type": "number" },
          "minItems": 2,
          "maxItems": 2
        },
        "center": {
          "description": "Arc center point [x, y] in declared length units. Required for arc.",
          "type": "array",
          "items": { "type": "number" },
          "minItems": 2,
          "maxItems": 2
        },
        "sweep_rad": {
          "description": "Signed arc sweep in radians (positive counter-clockwise). Required for arc.",
          "type": "number"
        },
        "duration_s": {
          "description": "Dwell duration in seconds. Required for dwell.",
          "type": "number",
          "exclusiveMinimum": 0
        },
        "velocity": { "$ref": "#/$defs/Velocity" },
        "power": { "$ref": "#/$defs/Power" },
        "blanked": {
          "description": "If true, the laser is off during this segment regardless of power. Defaults to false.",
          "type": "boolean",
          "default": false
        }
      },
      "allOf": [
        {
          "if": { "properties": { "type": { "const": "line" } } },
          "then": { "required": ["p0", "p1"] }
        },
        {
          "if": { "properties": { "type": { "const": "move" } } },
          "then": { "required": ["p0", "p1"] }
        },
        {
          "if": { "properties": { "type": { "const": "arc" } } },
          "then": { "required": ["p0", "p1", "center", "sweep_rad"] }
        },
        {
          "if": { "properties": { "type": { "const": "dwell" } } },
          "then": { "required": ["p0", "duration_s"] }
        }
      ]
    },

    "Samples": {
      "description": "Dense time-sampled waveform representation.",
      "type": "object",
      "required": ["sample_rate_hz", "x", "y"],
      "additionalProperties": false,
      "properties": {
        "sample_rate_hz": {
          "description": "Uniform sampling rate of all arrays in this block, in hertz.",
          "type": "number",
          "exclusiveMinimum": 0
        },
        "encoding": {
          "description": "Reserved for future binary encodings. Phase 1 supports only inline JSON arrays.",
          "type": "string",
          "enum": ["inline", "base64_float32", "base64_float64"],
          "default": "inline"
        },
        "x": {
          "description": "X coordinates at each sample, in declared length units.",
          "type": "array",
          "items": { "type": "number" }
        },
        "y": {
          "description": "Y coordinates at each sample, in declared length units.",
          "type": "array",
          "items": { "type": "number" }
        },
        "z": {
          "description": "Optional Z coordinates (reserved for 3D scans).",
          "type": "array",
          "items": { "type": "number" }
        },
        "power": {
          "description": "Optional power at each sample, in declared power units. If absent, pattern.default_power_w is used.",
          "type": "array",
          "items": { "type": "number" }
        },
        "blanked": {
          "description": "Optional per-sample blanking flag. If absent, no samples are blanked.",
          "type": "array",
          "items": { "type": "boolean" }
        }
      }
    },

    "ParameterizedShape": {

<script>
// LSP main-thread validator (web/lsp/validate.js).  Stage 1 = Ajv schema
// check using LSP_SCHEMA and the bundled Ajv2020.  Stage 2 = pure-JS
// plausibility checks (finite numbers, bbox sanity, segment count caps,
// per-segment power consistency, etc).  Exposes window.LSPValidate.
/* ════════════════════════════════════════════════════════════════════════════
 * web/lsp/validate.js — LSP-JSON document validator
 *
 * Two-stage validation pipeline:
 *
 *   Stage 1: Structural validation against the JSON Schema (Ajv compiled at
 *            load time). Catches type errors, missing required fields, enum
 *            violations, out-of-range numbers, and the if/then conditionals
 *            that enforce representation ↔ payload correspondence.
 *
 *   Stage 2: Physical-plausibility validation in plain JavaScript. Catches
 *            issues that JSON Schema cannot express: array-length mismatches

 *            declared bounding box; total integrated path duration that
 *            exceeds the exposure window by an unreasonable factor; sample

 *            but a generator may emit them as null or a string).

            code: ERROR_CODES.UNKNOWN_LSP_VERSION,
            path: "/lsp_version",
            message: "Document declares lsp_version " + doc.lsp_version +

          code: ERROR_CODES.PULSE_BLOCK_MISSING,
          path: "/laser/pulse",
          message: "pulse_mode is 'pulsed' but the laser.pulse block is missing, null, or " +

          code: ERROR_CODES.UNIT_CONVERSION_UNSUPPORTED,

            "Phase 1 supports mm natively. um conversion is supported; rad and V require calibration."
        });

          errors.push({
            code: ERROR_CODES.UNIT_CONVERSION_UNSUPPORTED,
            path: "/meta/units/length",
            message: "Length unit " + u.length + " requires a calibration block (not yet supported in Phase 1)."

          code: ERROR_CODES.UNIT_CONVERSION_UNSUPPORTED,
          path: "/meta/units/power",

          code: ERROR_CODES.SEGMENT_OVER_CAP,
          path: "/pattern/segments",
          message: "Segment count " + doc.pattern.segments.length +

              path: "/pattern/segments/" + di + "/id",
              message: "Segment id " + dseg.id + " is duplicated (first seen at index " +

    // fall back to segments-mode routing, which may surprise the user. Surface
    // this as a hard error.

          code: ERROR_CODES.AUTHORITATIVE_PARAMETERIZED_EMPTY,
          path: "/pattern/parameterized",
          message: "pattern.authoritative is 'parameterized' but pattern.parameterized is " +
            "missing or empty. Either supply a parameterized shape definition or change " +
            "pattern.authoritative to 'segments' or 'samples'."

            code: ERROR_CODES.SAMPLES_ARRAY_LENGTH_MISMATCH,
            path: "/pattern/samples/y",
            message: "samples.y has " + s.y.length + " elements but samples.x has " + n
          });
        }
        if (Array.isArray(s.z) && s.z.length !== n) {
          errors.push({
            code: ERROR_CODES.SAMPLES_ARRAY_LENGTH_MISMATCH,
            path: "/pattern/samples/z",
            message: "samples.z has " + s.z.length + " elements but samples.x has " + n

            message: "samples.power has " + s.power.length + " elements but samples.x has " + n

            path: "/pattern/samples/y/" + m,

          message: "coordinate component is not a finite number"

      // and compare those once.

      for (var j = 0; j < samp.x.length; j++) {

        if (_isFiniteNumber(x)) { if (x < sxmin) sxmin = x; if (x > sxmax) sxmax = x; }
        if (_isFiniteNumber(y)) { if (y < symin) symin = y; if (y > symax) symax = y; }
      }
      if (sxmin < xmin - minSlack || sxmax > xmax + minSlack ||
          symin < ymin - minSlackY || symax > ymax + minSlackY) {
        warnings.push({
          code: ERROR_CODES.BBOX_VIOLATION,
          path: "/pattern/samples",
          message: "Sample-array extent (x: [" + sxmin + ", " + sxmax + "], " +
            "y: [" + symin + ", " + symax + "]) exceeds declared extent_bbox"
        });

    }

      if (!Array.isArray(seg.p0) || !Array.isArray(seg.p1)) return 0;

      var len = Math.sqrt(dx * dx + dy * dy);
      var v = _resolveVelocity(seg, defaultVel);
      if (!_isFiniteNumber(v) || v <= 0) return 0;

      if (seg.velocity && seg.velocity.mode === "linear_ramp") {
        var v0 = seg.velocity.v_start_mm_per_s;
        var v1 = seg.velocity.v_end_mm_per_s;
        var vavg = (v0 + v1) / 2;
        if (_isFiniteNumber(vavg) && vavg > 0) return len / vavg;
      }
      return len / v;
    }

          !_isFiniteNumber(seg.sweep_rad)) return 0;
      var rx = seg.p0[0] - seg.center[0], ry = seg.p0[1] - seg.center[1];
      var r = Math.sqrt(rx * rx + ry * ry);
      var arclen = r * Math.abs(seg.sweep_rad);

  }

    if (!seg.velocity) return defaultVel;
    if (seg.velocity.mode === "constant") return seg.velocity.value_mm_per_s;
    if (seg.velocity.mode === "linear_ramp") {
      var v0 = seg.velocity.v_start_mm_per_s;
      var v1 = seg.velocity.v_end_mm_per_s;
      if (_isFiniteNumber(v0) && _isFiniteNumber(v1)) return (v0 + v1) / 2;
    }
