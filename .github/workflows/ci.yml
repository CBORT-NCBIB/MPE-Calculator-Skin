name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  # ── Python tests (pytest) ──────────────────────────────────
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      # FIX (audit dim 5): Run via pytest, not raw `python tests/file.py`.
      # Raw script execution can silently exit 0 on import errors.
      - name: Run tests
        run: pytest tests/ -v

  # ── Python linting ─────────────────────────────────────────
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check src/ tests/

  # ── JavaScript engine tests (Node.js) ──────────────────────
  js-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run engine.js tests
        run: node tests/test_engine_js.mjs

      - name: Install Ajv for LSP Node-side tests
        working-directory: web
        run: npm install ajv

      - name: Run LSP validator tests
        run: node tests/lsp/test_validate.mjs

      - name: Run LSP factory tests
        run: node tests/lsp/test_factory.mjs

      - name: Run LSP canonicalization tests
        run: node tests/lsp/test_canonicalize.mjs

      - name: Run LSP worker tests
        run: node tests/lsp/test_worker.mjs

  # ── Build verification ─────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: [python-tests, js-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js (for Babel + bundle smoke test)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install build dependencies (Babel)
        working-directory: web
        run: npm install
        # web/package.json lists @babel/core and @babel/preset-react as
        # devDependencies; npm install pulls them in so build.py can
        # pre-compile JSX rather than falling back to runtime Babel.

      - name: Build index.html
        run: python web/build.py

      - name: Verify build output
        run: |
          test -f web/index.html || { echo "FAIL: index.html not found"; exit 1; }
          grep -q 'ReactDOM' web/index.html || { echo "FAIL: ReactDOM not in output"; exit 1; }
          grep -q 'MPEEngine' web/index.html || { echo "FAIL: MPEEngine not in output"; exit 1; }
          grep -q '__LSP_CANONICALIZE_SRC__' web/index.html || { echo "FAIL: LSP canonicalize source not in output"; exit 1; }
          grep -q '__LSP_WORKER_SRC__' web/index.html || { echo "FAIL: LSP worker source not in output"; exit 1; }
          grep -q '__createLSPWorker' web/index.html || { echo "FAIL: LSP worker factory not in output"; exit 1; }
          echo "Build OK: index.html contains expected markers"

      - name: Validate bundle (syntax + worker round-trip)
        run: node tests/lsp/test_bundle.mjs
