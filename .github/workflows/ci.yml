name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Python tests (pytest) ──────────────────────────────────
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      # FIX (audit dim 5): Run via pytest, not raw `python tests/file.py`.
      # Raw script execution can silently exit 0 on import errors.
      - name: Run tests
        run: pytest tests/ -v

  # ── Python linting ─────────────────────────────────────────
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check src/ tests/

  # ── JavaScript engine tests (Node.js) ──────────────────────
  js-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run engine.js tests
        run: node tests/test_engine_js.mjs

  # ── Build verification ─────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: [python-tests, js-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build index.html
        run: python web/build.py

      - name: Verify build output exists
        run: test -f web/index.html && echo "Build OK"
