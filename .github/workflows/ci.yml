name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run skin MPE tests (38 checks)
        run: python tests/test_skin_mpe.py

      - name: Run skin parameters tests (32 checks)
        run: python tests/test_skin_parameters.py

      - name: Run correction factors tests (5 checks)
        run: python tests/test_correction_factors.py

      - name: Run exhaustive verification (254 checks)
        run: python tests/verify_exhaustive.py
